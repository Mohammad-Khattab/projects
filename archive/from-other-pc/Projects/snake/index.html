<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Snake</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

:root {
  --bg: #000000; --bg-card: #141414; --bg-dim: #28282d;
  --muted: #50505a; --secondary: #78788a; --text: #b4b4b4;
  --cyan: #328cff; --green: #00c864; --amber: #ffc800;
  --red: #ff5050; --border: #28282d; --snake: #00c864; --radius: 8px;
}
body.theme-dark { --bg: #000000; --bg-card: #141414; --bg-dim: #1a1a1a; }
body.theme-grey { --bg: #1c1c1e; --bg-card: #2a2a2e; --bg-dim: #34343a; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 15px; line-height: 1.5; min-height: 100vh; overflow-x: hidden;
}
[data-view] { display: none; }
[data-view].active { display: flex; flex-direction: column; min-height: 100vh; }

/* ── SPLASH ── */
#view-splash {
  position: fixed; inset: 0; z-index: 200;
  align-items: center; justify-content: center; gap: 24px;
  background: var(--bg); transition: opacity 0.45s ease;
}
#view-splash.fade-out { opacity: 0; pointer-events: none; }
.splash-label {
  font-size: 13px; font-weight: 600; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--secondary);
  animation: splash-blink 1.2s ease-in-out infinite;
}
@keyframes splash-blink { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* ── TYPOGRAPHY ── */
#title-wrap {
  position: relative;
  display: inline-block;
}
#title-snake-canvas {
  position: absolute;
  pointer-events: none;
  z-index: 0;   /* sits BEHIND the text */
}
.title-logo {
  font-size: clamp(3rem,12vw,6rem); font-weight: 900;
  letter-spacing: 0.15em; color: var(--snake); text-transform: uppercase;
  display: inline-block; position: relative; z-index: 2; /* text on top */
}
.title-logo::after {
  content: ''; display: block; height: 4px;
  background: var(--snake); border-radius: 2px; margin-top: 6px;
  animation: uline-pulse 2s ease-in-out infinite;
}
@keyframes uline-pulse { 0%,100%{opacity:1;transform:scaleX(1)} 50%{opacity:0.4;transform:scaleX(0.7)} }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 12px 28px; border: none; border-radius: var(--radius);
  font-size: 15px; font-weight: 600; letter-spacing: 0.03em;
  cursor: pointer; transition: opacity .15s, transform .1s; user-select: none;
}
.btn:active { transform: scale(0.97); }
.btn-primary   { background: var(--snake); color: #000; }
.btn-primary:hover { opacity: .88; }
.btn-secondary { background: var(--bg-dim); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-card); }
.btn-ghost     { background: transparent; color: var(--secondary); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--muted); }
.btn-lg { padding: 16px 48px; font-size: 18px; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; color: var(--secondary);
  font-size: 14px; cursor: pointer; padding: 8px 0; transition: color .15s;
}
.back-btn:hover { color: var(--text); }
.back-btn::before { content: '←'; font-size: 16px; }

/* ── HOME ── */
#view-home { align-items: center; justify-content: center; padding: 40px 24px; gap: 40px; text-align: center; }
.home-header { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.home-subtitle { color: var(--secondary); font-size: 14px; letter-spacing: .08em; text-transform: uppercase; }
.settings-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 28px 32px; width: 100%; max-width: 440px;
  display: flex; flex-direction: column; gap: 28px;
}
.setting-row { display: flex; flex-direction: column; gap: 10px; }
.setting-label { font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--secondary); }
.color-picker-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.swatch {
  width: 32px; height: 32px; border-radius: 50%;
  cursor: pointer; border: 3px solid transparent; transition: transform .15s, border-color .15s; flex-shrink: 0;
}
.swatch:hover { transform: scale(1.15); }
.swatch.active { border-color: #fff; transform: scale(1.1); }
.swatch-custom {
  width: 32px; height: 32px; border-radius: 50%; overflow: hidden;
  cursor: pointer; border: 3px solid var(--border); transition: border-color .15s; flex-shrink: 0; position: relative;
}
.swatch-custom:hover { border-color: var(--muted); }
.swatch-custom input[type="color"] {
  position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px);
  border: none; padding: 0; cursor: pointer; opacity: 0;
}
.swatch-custom-bg {
  width: 100%; height: 100%;
  background: conic-gradient(red,yellow,lime,cyan,blue,magenta,red); border-radius: 50%; pointer-events: none;
}
.theme-toggle { display: flex; gap: 8px; }
.theme-btn {
  flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg-dim); color: var(--secondary); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .15s; text-align: center;
}
.theme-btn:hover { color: var(--text); }
.theme-btn.active { border-color: var(--snake); color: var(--snake); }
.mode-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 440px; }

/* ── MAP SELECT ── */
#view-map { padding: 32px 24px 48px; align-items: center; gap: 28px; }
.page-header { width: 100%; max-width: 760px; display: flex; flex-direction: column; gap: 4px; }
.page-header-row { display: flex; align-items: center; gap: 16px; }
.page-title { font-size: 22px; font-weight: 700; color: var(--text); }
.page-sub { font-size: 13px; color: var(--secondary); }
.map-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 16px; width: 100%; max-width: 760px; }
.map-card { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: transform .15s, border-color .2s; position: relative; }
.map-card:hover { transform: translateY(-3px); border-color: var(--snake); }
.map-thumb { height: 120px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.map-thumb-deco { position: absolute; inset: 0; pointer-events: none; }
.map-name { font-size: 14px; font-weight: 600; color: var(--text); padding: 12px 16px; background: var(--bg-card); border-top: 1px solid var(--border); }
.map-badge { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; background: rgba(50,140,255,.15); color: var(--cyan); margin-top: 2px; display: inline-block; }

/* Map backgrounds */
.map-ocean  .map-thumb { background: linear-gradient(165deg,#020c1b 0%,#0a2545 30%,#0e4a7c 65%,#1a6fa0 100%); }
.map-earth  .map-thumb { background: linear-gradient(165deg,#0c1a05 0%,#1e4a0e 35%,#3a7a1e 65%,#5aa030 100%); }
.map-moon   .map-thumb { background: radial-gradient(ellipse at 35% 25%,#9a9aaa 0%,#6a6a7a 35%,#3a3a46 70%,#1a1a22 100%); }
.map-space  .map-thumb { background: radial-gradient(ellipse at 40% 35%,#0e0e2e 0%,#06061a 60%,#000008 100%); }
.map-desert .map-thumb { background: linear-gradient(165deg,#2a0e00 0%,#6e2a00 30%,#b85a10 60%,#d8901c 85%,#ebb84a 100%); }
.map-arctic .map-thumb { background: linear-gradient(165deg,#08101e 0%,#102030 30%,#1a4060 60%,#3a7090 85%,#6aaabf 100%); }
.map-lava   .map-thumb { background: radial-gradient(ellipse at 50% 85%,#ff5500 0%,#aa1500 35%,#550500 65%,#0e0000 100%); }
.map-city   .map-thumb { background: linear-gradient(180deg,#04040e 0%,#0c0c1e 50%,#080814 100%); }
.map-jungle .map-thumb { background: linear-gradient(165deg,#050e02 0%,#0e2208 35%,#1a4010 65%,#2a5c18 100%); }
.map-ocean  .map-thumb::after { content:''; position:absolute; left:-5%; right:-5%; bottom:15%; height:40px; border-radius:50%; border-top:1.5px solid rgba(80,160,255,.3); box-shadow:0 18px 0 rgba(80,160,255,.18),0 36px 0 rgba(80,160,255,.1); }
.map-moon   .map-thumb-deco::before,.map-moon .map-thumb-deco::after { content:''; position:absolute; border-radius:50%; border:1.5px solid rgba(180,180,200,.25); box-shadow:inset 0 2px 4px rgba(0,0,0,.5); }
.map-moon   .map-thumb-deco::before { width:30px; height:30px; top:18px; left:20px; }
.map-moon   .map-thumb-deco::after  { width:18px; height:18px; bottom:20px; right:28px; }
.map-space  .map-thumb-deco::before { content:''; position:absolute; inset:0; background-image: radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.95) 0%,transparent 100%),radial-gradient(1px 1px at 78% 30%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 42% 62%,rgba(255,255,255,.85) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 65% 15%,white 0%,transparent 100%),radial-gradient(1px 1px at 88% 72%,rgba(200,220,255,.9) 0%,transparent 100%),radial-gradient(1px 1px at 25% 80%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 55% 40%,rgba(200,200,255,.8) 0%,transparent 100%); }
.map-desert .map-thumb::after { content:''; position:absolute; bottom:0; left:0; right:0; height:40%; background:linear-gradient(180deg,transparent 0%,rgba(90,35,0,.6) 100%); clip-path:ellipse(60% 100% at 50% 100%); }
.map-lava   .map-thumb::after { content:''; position:absolute; bottom:0; left:0; right:0; height:55%; background:linear-gradient(0deg,rgba(255,80,0,.35) 0%,transparent 100%); animation:lava-thumb-glow 1.5s ease-in-out infinite alternate; }
@keyframes lava-thumb-glow { from{opacity:.6} to{opacity:1} }
.map-city   .map-thumb-deco::before { content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(50,50,100,.25) 1px,transparent 1px),linear-gradient(90deg,rgba(50,50,100,.25) 1px,transparent 1px); background-size:22px 22px; }
.map-city   .map-thumb-deco::after { content:''; position:absolute; inset:0; background-image:radial-gradient(1.5px 1.5px at 18% 65%,rgba(255,220,80,.7) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 38% 55%,rgba(255,220,80,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 62% 70%,rgba(200,200,255,.6) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 80% 48%,rgba(255,220,80,.7) 0%,transparent 100%); }
.map-jungle .map-thumb::after { content:''; position:absolute; top:0; left:0; right:0; height:45%; background:linear-gradient(180deg,rgba(20,60,10,.7) 0%,transparent 100%); }

/* ── LEVEL SELECT ── */
#view-level { padding: 32px 24px 48px; align-items: center; gap: 28px; }
.level-list { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 480px; }
.level-card {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 18px 24px; cursor: pointer; transition: border-color .15s, background .15s;
}
.level-card:hover { border-color: var(--snake); background: var(--bg-dim); }
.level-info { display: flex; flex-direction: column; gap: 4px; }
.level-num    { font-size: 17px; font-weight: 700; color: var(--text); }
.level-target { font-size: 13px; color: var(--secondary); }
.level-speed-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.speed-slow     { background: rgba(0,200,100,.15); color: var(--green); }
.speed-med-slow { background: rgba(50,140,255,.15); color: var(--cyan); }
.speed-medium   { background: rgba(255,200,0,.15);  color: var(--amber); }
.speed-med-fast { background: rgba(255,150,0,.15);  color: #ff9a00; }
.speed-fast     { background: rgba(255,80,80,.15);  color: var(--red); }

/* ── GAME VIEW ── */
#view-game { align-items: center; padding: 0; position: relative; justify-content: flex-start; }
.game-hud {
  width: 100%; max-width: 560px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 10px; flex-shrink: 0; gap: 8px;
}
.hud-score { display: flex; flex-direction: column; gap: 2px; }
.hud-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
.hud-value { font-size: 22px; font-weight: 800; color: var(--text); }
.hud-value.accent { color: var(--snake); }
.hud-value.gold { color: var(--amber); }
.hud-pause-btn {
  background: var(--bg-dim); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; color: var(--secondary);
  font-size: 13px; cursor: pointer; transition: color .15s;
}
.hud-pause-btn:hover { color: var(--text); }

.game-arena-wrap { position: relative; width: 100%; max-width: 560px; aspect-ratio: 1; flex-shrink: 0; padding: 0 8px; }
#game-arena { width: 100%; height: 100%; border-radius: 10px; overflow: hidden; position: relative; }
#game-canvas { display: block; width: 100%; height: 100%; position: relative; z-index: 2; }

/* Arena map backgrounds */
#game-arena.map-ocean  { background: linear-gradient(145deg,#020c1b 0%,#0a2545 35%,#0e4a7c 70%,#166090 100%); }
#game-arena.map-earth  { background: linear-gradient(145deg,#0a1805 0%,#1e480e 40%,#386c1a 75%,#4e8828 100%); }
#game-arena.map-moon   { background: radial-gradient(ellipse at 30% 20%,#8a8a9e 0%,#5a5a6e 40%,#2e2e3c 75%,#141420 100%); }
#game-arena.map-space  { background: radial-gradient(ellipse at 45% 45%,#0c0c2e 0%,#050518 60%,#000004 100%); }
#game-arena.map-desert { background: linear-gradient(145deg,#2a0e00 0%,#6e2a00 35%,#aa4e0e 70%,#c87818 100%); }
#game-arena.map-arctic { background: linear-gradient(145deg,#06101e 0%,#102038 40%,#1c406a 75%,#2e5c88 100%); }
#game-arena.map-lava   { background: radial-gradient(ellipse at 50% 90%,#ee4400 0%,#900800 45%,#3c0000 80%,#080000 100%); }
#game-arena.map-city   { background: linear-gradient(180deg,#03030c 0%,#0a0a1c 60%,#060610 100%); }
#game-arena.map-jungle { background: linear-gradient(145deg,#04080202 0%,#0c1c06 35%,#162e0c 70%,#1e3c12 100%); }

#game-arena::before, #game-arena::after { content:''; position:absolute; inset:0; z-index:1; pointer-events:none; }
#game-arena.map-space::before { background-image: radial-gradient(1px 1px at  7% 11%,rgba(255,255,255,.95) 0%,transparent 100%),radial-gradient(1px 1px at 21% 44%,rgba(255,255,255,.75) 0%,transparent 100%),radial-gradient(1px 1px at 54%  8%,rgba(255,255,255,.85) 0%,transparent 100%),radial-gradient(1px 1px at 67% 71%,rgba(255,255,255,.90) 0%,transparent 100%),radial-gradient(1px 1px at 84% 27%,rgba(255,255,255,.65) 0%,transparent 100%),radial-gradient(1px 1px at 91% 54%,rgba(255,255,255,.80) 0%,transparent 100%),radial-gradient(1px 1px at 37% 87%,rgba(255,255,255,.70) 0%,transparent 100%),radial-gradient(1px 1px at 14% 77%,rgba(255,255,255,.55) 0%,transparent 100%),radial-gradient(1px 1px at 72% 91%,rgba(255,255,255,.90) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 47% 34%,white 0%,transparent 100%),radial-gradient(1px 1px at 29% 17%,rgba(200,215,255,.85) 0%,transparent 100%),radial-gradient(1px 1px at 79%  7%,rgba(200,215,255,.75) 0%,transparent 100%); animation:twinkle 3.5s ease-in-out infinite alternate; }
@keyframes twinkle { from{opacity:.65} to{opacity:1} }
#game-arena.map-city::before { background-image:linear-gradient(rgba(40,40,90,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(40,40,90,.22) 1px,transparent 1px); background-size:28px 28px; }
#game-arena.map-city::after { background-image: radial-gradient(1.5px 1.5px at 8% 22%,rgba(255,220,80,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 22% 68%,rgba(255,220,80,.4) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 36% 14%,rgba(200,210,255,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 50% 80%,rgba(255,220,80,.45) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 64% 38%,rgba(255,220,80,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 78% 72%,rgba(200,210,255,.4) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 92% 18%,rgba(255,220,80,.5) 0%,transparent 100%); }
#game-arena.map-lava::before { background:radial-gradient(ellipse at 50% 100%,rgba(255,100,0,.28) 0%,transparent 60%); animation:lava-pulse 2s ease-in-out infinite alternate; }
@keyframes lava-pulse { from{opacity:.55} to{opacity:1} }
#game-arena.map-ocean::before { background:radial-gradient(ellipse at 20% 80%,rgba(20,100,200,.15) 0%,transparent 40%),radial-gradient(ellipse at 80% 20%,rgba(20,80,180,.12) 0%,transparent 40%); animation:ocean-shift 6s ease-in-out infinite alternate; }
@keyframes ocean-shift { from{transform:translate(0,0)} to{transform:translate(3px,5px)} }
#game-arena.map-jungle::before { background:linear-gradient(180deg,rgba(10,30,5,.45) 0%,transparent 30%),linear-gradient(0deg,rgba(8,24,4,.30) 0%,transparent 25%); }

/* Challenge banner */
.challenge-banner {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.88); border: 1px solid var(--amber); color: var(--amber);
  padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; z-index: 5;
  pointer-events: none; white-space: nowrap;
  transition: opacity .3s; opacity: 1;
}
.challenge-banner.hidden { opacity: 0; }

/* Mobile controls */
.mobile-controls { display: none; width: 100%; max-width: 240px; margin: 12px auto 0; flex-shrink: 0; }
.dpad { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 6px; width: 160px; margin: 0 auto; }
.dpad-btn {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  cursor: pointer; color: var(--secondary); transition: background .1s, color .1s; user-select: none; -webkit-user-select: none;
}
.dpad-btn:active { background: var(--bg-dim); color: var(--text); }
.dpad-center { visibility: hidden; }
@media (pointer: coarse) { .mobile-controls { display: flex; justify-content: center; } }
@media (max-width: 540px) { .mobile-controls { display: flex; justify-content: center; } }

/* Overlay */
.overlay {
  position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  background: rgba(0,0,0,.82); border-radius: 10px; text-align: center; padding: 32px 24px;
}
.overlay.hidden { display: none; }
.overlay-title { font-size: 28px; font-weight: 800; color: #fff; }
.overlay-title.gold { color: var(--amber); }
.overlay-score { font-size: 40px; font-weight: 900; color: var(--snake); }
.overlay-sub   { font-size: 15px; color: var(--secondary); }
.overlay-record { font-size: 13px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--amber); }
.overlay-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; padding: 24px; }
.modal-backdrop.hidden { display: none; }
.modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 32px 28px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 20px; text-align: center; }
.modal-title { font-size: 20px; font-weight: 700; color: var(--text); }
.modal-body   { color: var(--secondary); font-size: 14px; }
.modal-actions { display: flex; gap: 10px; }
.modal-actions .btn { flex: 1; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-dim); border-radius: 3px; }
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  [data-view].active { padding-bottom: max(24px, env(safe-area-inset-bottom)); }
}
</style>
</head>
<body class="theme-dark">

<!-- SPLASH -->
<div id="view-splash" data-view class="active">
  <canvas id="splash-canvas"></canvas>
  <div class="splash-label">Loading</div>
</div>

<!-- HOME -->
<div id="view-home" data-view>
  <div class="home-header">
    <div id="title-wrap">
      <span class="title-logo">Snake</span>
      <canvas id="title-snake-canvas"></canvas>
    </div>
    <span class="home-subtitle">Choose your style, then play</span>
  </div>
  <div class="settings-card">
    <div class="setting-row">
      <div class="setting-label">Snake Color</div>
      <div class="color-picker-row" id="color-swatches"></div>
    </div>
    <div class="setting-row">
      <div class="setting-label">Theme</div>
      <div class="theme-toggle">
        <button class="theme-btn active" data-theme="dark" onclick="setTheme('dark')">Dark</button>
        <button class="theme-btn"        data-theme="grey" onclick="setTheme('grey')">Grey</button>
      </div>
    </div>
  </div>
  <div class="mode-buttons">
    <button class="btn btn-primary btn-lg"   onclick="goToMapSelect('free')">Free Play</button>
    <button class="btn btn-secondary btn-lg" onclick="goToMapSelect('levels')">Levels</button>
  </div>
</div>

<!-- MAP SELECT -->
<div id="view-map" data-view>

  space:'rgba(80,80,180,.05)', desert:'rgba(210,150,60,.07)', arctic:'rgba(120,190,255,.07)',
  lava:'rgba(255,80,20,.08)', city:'rgba(60,60,160,.06)', jungle:'rgba(40,140,30,.07)',

const MAP_PARTICLE_CONFIG = {
  ocean:  { count:2, create(px,py)      { return {x:px+(Math.random()-.5)*6,y:py+(Math.random()-.5)*6,vx:(Math.random()-.5)*.5,vy:-(Math.random()*.9+.3),gravity:0,size:Math.random()*2.8+1.2,life:1,decay:.022,r:80+Math.random()*40,g:160+Math.random()*40,b:255,ring:Math.random()>.4}; } },
  earth:  { count:3, create(px,py,d)    { return {x:px+(Math.random()-.5)*8,y:py+(Math.random()-.5)*8,vx:(Math.random()-.5)*2.2+(-d.x)*.8,vy:Math.random()*1.2+(-d.y)*.8,gravity:.06,size:Math.random()*2.5+1,life:1,decay:.03,r:100+Math.random()*40,g:70+Math.random()*30,b:20+Math.random()*20,ring:false}; } },
  moon:   { count:3, create(px,py,d)    { return {x:px+(Math.random()-.5)*10,y:py+(Math.random()-.5)*10,vx:(Math.random()-.5)*2.5+(-d.x)*.6,vy:(Math.random()-.5)*1.5,gravity:.015,size:Math.random()*2+.8,life:1,decay:.018,r:160+Math.random()*40,g:160+Math.random()*40,b:180+Math.random()*40,ring:false}; } },
  space:  { count:2, create(px,py)      { const b=Math.random()*80+175; return {x:px+(Math.random()-.5)*12,y:py+(Math.random()-.5)*12,vx:(Math.random()-.5)*1.2,vy:(Math.random()-.5)*1.2,gravity:0,size:Math.random()*2+.7,life:1,decay:.016,r:b,g:b,b:255,ring:false}; } },
  desert: { count:3, create(px,py,d)    { return {x:px+(Math.random()-.5)*8,y:py+(Math.random()-.5)*4,vx:(Math.random()*2+.5)*(d.x||(Math.random()>.5?1:-1)),vy:-(Math.random()*.6),gravity:.05,size:Math.random()*2+.8,life:1,decay:.028,r:200+Math.random()*40,g:150+Math.random()*40,b:50+Math.random()*40,ring:false}; } },
  arctic: { count:2, create(px,py)      { return {x:px+(Math.random()-.5)*8,y:py+(Math.random()-.5)*8,vx:(Math.random()-.5)*.8,vy:Math.random()*.7+.2,gravity:.01,size:Math.random()*2.2+.8,life:1,decay:.020,r:160+Math.random()*60,g:210+Math.random()*30,b:255,ring:Math.random()>.5}; } },
  lava:   { count:3, create(px,py)      { const hot=Math.random()>.4; return {x:px+(Math.random()-.5)*8,y:py+(Math.random()-.5)*8,vx:(Math.random()-.5)*1.8,vy:-(Math.random()*1.8+.5),gravity:.04,size:Math.random()*2.8+1,life:1,decay:.026,r:255,g:hot?140+Math.random()*60:50+Math.random()*50,b:0,ring:false}; } },
  city:   { count:2, create(px,py,d)    { const b=Math.random()*80+175; return {x:px,y:py,vx:(Math.random()*2.5+1)*(d.x||(Math.random()>.5?1:-1)),vy:(Math.random()-.5)*.4,gravity:0,size:Math.random()*1.8+.6,life:1,decay:.038,r:b,g:b,b:Math.random()*80+100,ring:false}; } },
  jungle: { count:2, create(px,py)      { return {x:px+(Math.random()-.5)*8,y:py+(Math.random()-.5)*8,vx:(Math.random()-.5)*.9,vy:Math.random()*.8+.1,gravity:.02,size:Math.random()*2.8+1.2,life:1,decay:.020,r:30+Math.random()*50,g:130+Math.random()*80,b:20+Math.random()*40,ring:false}; } },
};

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════

const state = {
  theme:       localStorage.getItem('snake-theme') || 'dark',
  snakeColor:  localStorage.getItem('snake-color') || '#00c864',
  mode:        'free',
  currentMap:  null,
  currentLevel:null,
  snake:[], dir:{x:1,y:0}, nextDir:{x:1,y:0}, food:{x:0,y:0},
  score:0, paused:false, running:false, tickTimer:null,
  rafId:null, particles:[], lastTailPos:null,
  ch: null,  // challenge state
};

// ════════════════════════════════════════════════════
//  TITLE SNAKE ANIMATION  (organic random, behind text)
// ════════════════════════════════════════════════════

const titleSnake = { rafId: null };

function startTitleSnake() {
  const wrap   = document.getElementById('title-wrap');
  const canvas = document.getElementById('title-snake-canvas');
  if (!wrap || !canvas) return;

  const PAD = 20;
  const w = wrap.offsetWidth, h = wrap.offsetHeight;
  if (!w || !h) return;
  canvas.width  = w + PAD * 2;
  canvas.height = h + PAD * 2;
  canvas.style.left   = -PAD + 'px';
  canvas.style.top    = -PAD + 'px';
  canvas.style.width  = (w + PAD * 2) + 'px';
  canvas.style.height = (h + PAD * 2) + 'px';

  if (titleSnake.rafId) return;

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const N         = 13;
  const SEG_GAP   = 12;
  const SEG_SIZE  = 11;
  const SPEED     = 1.6;
  const MAX_TURN  = 0.048;
  const TRAIL_MAX = (N - 1) * SEG_GAP + 2;

  // Per-segment fade zone around a reference point:
  // segment is invisible within FADE_NEAR, fully visible beyond FADE_FAR
  const FADE_NEAR = 7;
  const FADE_FAR  = 42;
  function distAlpha(dist) {
    if (dist <= FADE_NEAR) return 0;
    if (dist >= FADE_FAR)  return 1;
    return (dist - FADE_NEAR) / (FADE_FAR - FADE_NEAR);
  }

  // Letter centres for S-n-a-k-e
  const LETTER_FX = [0.09, 0.26, 0.44, 0.62, 0.82];
  function letterPos(i) { return { x: PAD + (W - PAD * 2) * LETTER_FX[i], y: H * 0.48 }; }
  function pickLetter(exclude = -1) {
    let idx;
    do { idx = Math.floor(Math.random() * LETTER_FX.length); } while (idx === exclude);
    return { ...letterPos(idx), idx };
  }

  function newTarget() {
    return Math.random() < 0.65
      ? { x: PAD * 2 + Math.random() * (W - PAD * 4), y: H * 0.18 + Math.random() * H * 0.64 }
      : { x: 8 + Math.random() * (W - 16), y: 8 + Math.random() * (H - 16) };
  }

  // Snake state
  let hx = W / 2, hy = H / 2;
  let angle = Math.random() * Math.PI * 2;
  const trail = [];
  for (let i = 0; i <= TRAIL_MAX; i++) trail.push({ x: hx, y: hy });

  let phase        = 'roam';
  let phaseStart   = 0;
  let roamFor      = 5000 + Math.random() * 4000;
  let hideIdx      = -1;
  let hidePause    = 0;
  let hideTarget   = null;   // point the snake is disappearing into
  let emergeOrigin = null;   // point the snake is emerging from
  let target       = newTarget();
  let wobble       = 0;
  let lastTs       = null;

  function setPhase(p, ts) { phase = p; phaseStart = ts; }

  function frame(ts) {
    titleSnake.rafId = requestAnimationFrame(frame);
    if (!lastTs) { lastTs = ts; phaseStart = ts; }
    const dt      = Math.min(ts - lastTs, 50);
    lastTs        = ts;
    const scale   = dt / 16.67;
    const elapsed = ts - phaseStart;
    wobble += 0.04 * scale;

    // ── Phase transitions ──

    if (phase === 'roam' && elapsed > roamFor) {
      const letter = pickLetter();
      hideIdx    = letter.idx;
      hideTarget = { x: letter.x, y: letter.y };
      target     = { x: letter.x, y: letter.y };
      setPhase('hiding', ts);
    }

    if (phase === 'hiding') {
      // Done when the TAIL segment has reached the hide point
      const tailPos = trail[Math.min((N - 1) * SEG_GAP, trail.length - 1)];
      if (tailPos && Math.hypot(tailPos.x - hideTarget.x, tailPos.y - hideTarget.y) < FADE_NEAR + 2) {
        hidePause = 1500 + Math.random() * 2000;
        setPhase('hidden', ts);
      }
    }

    if (phase === 'hidden' && elapsed >= hidePause) {
      const letter = pickLetter(hideIdx);
      hideIdx      = letter.idx;
      emergeOrigin = { x: letter.x, y: letter.y };
      hx = letter.x; hy = letter.y;
      for (let i = 0; i <= TRAIL_MAX; i++) trail[i] = { x: hx, y: hy };
      angle  = Math.atan2(hy - H / 2, hx - W / 2) + (Math.random() - 0.5) * 1.1;
      target = newTarget();
      setPhase('emerging', ts);
    }

    if (phase === 'emerging') {
      // Done when the TAIL segment has moved past FADE_FAR from emerge point
      const tailPos = trail[Math.min((N - 1) * SEG_GAP, trail.length - 1)];
      if (tailPos && Math.hypot(tailPos.x - emergeOrigin.x, tailPos.y - emergeOrigin.y) >= FADE_FAR) {
        emergeOrigin = null;
        roamFor      = 5000 + Math.random() * 4000;
        setPhase('roam', ts);
      }
    }

    // ── Movement ──

    if (phase !== 'hidden') {
      const headAtTarget = phase === 'hiding' &&
        Math.hypot(hx - hideTarget.x, hy - hideTarget.y) < FADE_NEAR;

      if (headAtTarget) {
        // Head is at the letter — freeze it there so body flows in behind it
        hx = hideTarget.x;
        hy = hideTarget.y;
      } else {
        const dx = target.x - hx, dy = target.y - hy;
        if (phase === 'roam' && Math.hypot(dx, dy) < 22) target = newTarget();

        let desired = Math.atan2(dy, dx);
        if (phase === 'roam') {
          desired += Math.sin(wobble) * 0.18;
          const M = 14;
          if (hx < M)     desired = lerpAng(desired,  0,           0.35);
          if (hx > W - M) desired = lerpAng(desired,  Math.PI,     0.35);
          if (hy < M)     desired = lerpAng(desired,  Math.PI / 2, 0.35);
          if (hy > H - M) desired = lerpAng(desired, -Math.PI / 2, 0.35);
        }

        let diff = desired - angle;
        while (diff >  Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const turn = phase === 'hiding' ? MAX_TURN * 3.2 : MAX_TURN;
        const spd  = phase === 'hiding' ? SPEED * 1.7    : SPEED;
        angle += Math.max(-turn, Math.min(turn, diff)) * scale;
        hx = Math.max(2, Math.min(W - 2, hx + Math.cos(angle) * spd * scale));
        hy = Math.max(2, Math.min(H - 2, hy + Math.sin(angle) * spd * scale));
      }

      trail.unshift({ x: hx, y: hy });
      if (trail.length > TRAIL_MAX + 1) trail.pop();
    }

    // ── Draw ──
    ctx.clearRect(0, 0, W, H);
    if (phase === 'hidden') return;

    const color = state.snakeColor;

    for (let i = N - 1; i >= 0; i--) {
      const idx = i * SEG_GAP;
      if (idx >= trail.length) continue;
      const p    = trail[idx];
      const frac = i / (N - 1);

      // Per-segment alpha based on distance to the active reference point.
      // Hiding:   segments fade OUT as they approach hideTarget  (head first)
      // Emerging: segments fade IN  as they move away from emergeOrigin (head first)
      let phaseA = 1;
      if (phase === 'hiding' && hideTarget) {
        phaseA = distAlpha(Math.hypot(p.x - hideTarget.x, p.y - hideTarget.y));
      } else if (phase === 'emerging' && emergeOrigin) {
        phaseA = distAlpha(Math.hypot(p.x - emergeOrigin.x, p.y - emergeOrigin.y));
      }

      if (phaseA < 0.01) continue;
      ctx.globalAlpha = phaseA;
      ctx.fillStyle   = i === 0
        ? lighten(color, 0.38)
        : fadeColor(color, 1 - frac * 0.55);

      let sdx = 0, sdy = -1;
      if (idx > 0) { sdx = trail[idx - 1].x - p.x; sdy = trail[idx - 1].y - p.y; }

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.atan2(sdy, sdx));
      roundRect(ctx, -SEG_SIZE / 2, -SEG_SIZE / 2, SEG_SIZE, SEG_SIZE, 3);
      ctx.fill();

      if (i === 0 && phaseA > 0.25) {
        ctx.fillStyle = 'rgba(0,0,0,0.72)';
        const ey = SEG_SIZE * 0.2;
        ctx.beginPath(); ctx.arc(SEG_SIZE * 0.22, -ey, SEG_SIZE * 0.1, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(SEG_SIZE * 0.22,  ey, SEG_SIZE * 0.1, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }

  titleSnake.rafId = requestAnimationFrame(frame);
}

function stopTitleSnake() {
  if (titleSnake.rafId) { cancelAnimationFrame(titleSnake.rafId); titleSnake.rafId = null; }
  const canvas = document.getElementById('title-snake-canvas');
  if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function lerpAng(a, b, t) {
  let d = b - a;
  while (d >  Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return a + d * t;
}

// ════════════════════════════════════════════════════
//  HIGH SCORE
// ════════════════════════════════════════════════════

function hsKey() { return state.currentMap ? 'snake-hs-' + state.currentMap.id : null; }
function getHS()  { const k=hsKey(); return k ? parseInt(localStorage.getItem(k)||'0') : 0; }
function saveHS() {
  const k = hsKey();
  if (!k || state.mode !== 'free') return false;
  const prev = getHS();
  if (state.score > prev) { localStorage.setItem(k, state.score); return true; }
  return false;
}
function updateHudBest() {
  const wrap = document.getElementById('hud-best-wrap');
  if (state.mode === 'free' && state.currentMap) {
    wrap.style.display = 'flex';
    document.getElementById('hud-best').textContent = getHS();
  } else {
    wrap.style.display = 'none';
  }
}

// ════════════════════════════════════════════════════
//  SPLASH
// ════════════════════════════════════════════════════

function runSplash() {
  const el     = document.getElementById('view-splash');
  const canvas = document.getElementById('splash-canvas');
  const size   = Math.min(window.innerWidth*.6, window.innerHeight*.45, 220);
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx=size/2, cy=size/2, R=size*.32, N=16, gap=Math.PI*2/N, seg=size*.048;
  let angle=0, startTime=null, done=false;
  function frame(ts) {
    if (done) return;
    if (!startTime) startTime=ts;
    angle += .028;
    ctx.clearRect(0,0,size,size);
    for (let i=N-1; i>=0; i--) {
      const a=angle+i*gap, sx=cx+Math.cos(a)*R, sy=cy+Math.sin(a)*R, t=i/N;
      ctx.fillStyle = i===0 ? lighten(state.snakeColor,.35) : fadeColor(state.snakeColor,1-t*.55);
      const na=angle+(i-1)*gap, nx=cx+Math.cos(na)*R, ny=cy+Math.sin(na)*R;
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(Math.atan2(ny-sy,nx-sx));
      roundRect(ctx,-seg/2+1,-seg/2+1,seg-2,seg-2,3); ctx.fill();
      if (i===0) {
        ctx.fillStyle='rgba(0,0,0,.7)';
        ctx.beginPath(); ctx.arc(seg*.15,-seg*.18,seg*.09,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(seg*.15, seg*.18,seg*.09,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
    if (ts-startTime>1700 && !el.classList.contains('fade-out')) {
      el.classList.add('fade-out');
      setTimeout(()=>{ done=true; el.classList.remove('active'); showView('home'); }, 450);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ════════════════════════════════════════════════════
//  VIEW ROUTER
// ════════════════════════════════════════════════════

function showView(name) {
  document.querySelectorAll('[data-view]').forEach(v=>{ if(v.id!=='view-splash') v.classList.remove('active'); });
  const el=document.getElementById('view-'+name);
  if (el) el.classList.add('active');
  window.scrollTo(0,0);
  if (name === 'home') setTimeout(startTitleSnake, 80);
  else stopTitleSnake();
}

// ════════════════════════════════════════════════════
//  HOME
// ════════════════════════════════════════════════════

function initHome() {
  applyTheme(state.theme);
  document.documentElement.style.setProperty('--snake', state.snakeColor);
  const container = document.getElementById('color-swatches');
  container.innerHTML = '';
  PRESET_COLORS.forEach(color=>{
    const sw=document.createElement('div');
    sw.className='swatch'+(color===state.snakeColor?' active':'');
    sw.style.background=color; sw.onclick=()=>setSnakeColor(color,sw);
    container.appendChild(sw);
  });
  const cw=document.createElement('div'); cw.className='swatch-custom'; cw.title='Custom color';
  const bg=document.createElement('div'); bg.className='swatch-custom-bg';
  const inp=document.createElement('input'); inp.type='color'; inp.value=state.snakeColor;
  inp.oninput=e=>{ setSnakeColor(e.target.value,null); document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active')); };
  cw.appendChild(bg); cw.appendChild(inp); container.appendChild(cw);
}
function setTheme(t) {
  state.theme=t; localStorage.setItem('snake-theme',t); applyTheme(t);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===t));
}
function applyTheme(t) { document.body.className='theme-'+t; }
function setSnakeColor(color,swatchEl) {
  state.snakeColor=color; localStorage.setItem('snake-color',color);
  document.documentElement.style.setProperty('--snake',color);
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
  if (swatchEl) swatchEl.classList.add('active');
}

// ════════════════════════════════════════════════════
//  MAP SELECT
// ════════════════════════════════════════════════════

function goToMapSelect(mode) {
  state.mode=mode;
  document.getElementById('map-page-title').textContent = mode==='free' ? 'Free Play — Choose a Map' : 'Choose a Map';
  document.getElementById('map-page-sub').textContent   = mode==='free' ? 'Pick any map. Play until you lose.' : 'Each map has 5 levels with lamp targets.';
  showView('map');
}

function initMapGrid() {
  const grid=document.getElementById('map-grid'); grid.innerHTML='';
  MAPS.forEach(map=>{
    const card=document.createElement('div');
    card.className='map-card map-'+map.id;
    card.innerHTML=`<div class="map-thumb"><div class="map-thumb-deco"></div></div>
      <div class="map-name">${map.name}<br>
        <span style="font-weight:400;font-size:12px;color:var(--secondary)">${map.desc}</span>
        <span class="map-badge">${map.challenge}</span>
      </div>`;
    card.onclick=()=>selectMap(map);
    grid.appendChild(card);
  });
}

function selectMap(map) {
  state.currentMap=map;
  if (state.mode==='free') { showView('game'); initGame(); }
  else {
    document.getElementById('level-page-title').textContent = map.name+' — Levels';
    document.getElementById('level-page-sub').textContent   = 'Collect all lamps to advance.';
    initLevelList(); showView('level');
  }
}

// ════════════════════════════════════════════════════
//  LEVEL SELECT
// ════════════════════════════════════════════════════

function initLevelList() {
  const list=document.getElementById('level-list'); list.innerHTML='';
  LEVELS.forEach(lvl=>{
    const card=document.createElement('div'); card.className='level-card';
    card.innerHTML=`<div class="level-info"><div class="level-num">Level ${lvl.num}</div><div class="level-target">Eat ${lvl.target} lamps</div></div><span class="level-speed-badge ${lvl.badge}">${lvl.label}</span>`;
    card.onclick=()=>startLevel(lvl); list.appendChild(card);
  });
}

// ════════════════════════════════════════════════════
//  GAME INIT
// ════════════════════════════════════════════════════

function startLevel(lvl) { state.currentLevel=lvl; showView('game'); initGame(); }

function initGame() {
  stopGame();
  const canvas=document.getElementById('game-canvas');
  const size=canvas.parentElement.clientWidth;
  canvas.width=canvas.height=size;
  document.getElementById('game-arena').className=state.currentMap?'map-'+state.currentMap.id:'';

  if (state.mode==='levels') {
    document.getElementById('hud-label').textContent='Lamps';
    document.getElementById('hud-target-wrap').style.display='flex';
    document.getElementById('hud-target').textContent=state.currentLevel.target;
  } else {
    document.getElementById('hud-label').textContent='Score';
    document.getElementById('hud-target-wrap').style.display='none';
  }
  document.getElementById('hud-value').textContent='0';
  document.getElementById('game-overlay').classList.add('hidden');
  document.getElementById('pause-btn').textContent='Pause';
  updateHudBest();

  const cx=Math.floor(GRID/2), cy=Math.floor(GRID/2);
  state.snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  state.dir={x:1,y:0}; state.nextDir={x:1,y:0};
  state.score=0; state.paused=false; state.running=true;
  state.particles=[]; state.lastTailPos=null;

  spawnFood();

  const baseSpeed = state.mode==='levels' ? state.currentLevel.speed : 180;
  initChallenge(state.currentMap?.id || null, baseSpeed);
  state.tickTimer=setInterval(gameTick, baseSpeed);
  startRenderLoop();
}

function stopGame() {
  if (state.tickTimer) { clearInterval(state.tickTimer); state.tickTimer=null; }
  if (state.rafId)     { cancelAnimationFrame(state.rafId); state.rafId=null; }
  stopChallenge();
  state.running=false;
}

function restartTick(speed) {
  if (state.tickTimer) clearInterval(state.tickTimer);
  state.tickTimer=setInterval(gameTick,speed);
}

// ════════════════════════════════════════════════════
//  CHALLENGES
// ════════════════════════════════════════════════════

function initChallenge(mapId, baseSpeed) {
  if (!mapId) return;
  state.ch = {
    type:mapId, timers:[], bannerTimer:null, baseSpeed,
    // ocean
    crates:[], rapidGrowthUntil:0,
    // earth
    boulders:[],
    // moon
    driftPending:false,
    // space
    portals:null,
    // desert
    heatwave:false,
    // arctic
    slowActive:false,
    // lava
    lavaZones:[],
    // city
    speedTiles:[],
    // jungle
    vines:[],
  };
  const ch=state.ch;
  const iv=(fn,ms)=>{ const id=setInterval(fn,ms); ch.timers.push(id); return id; };
  const to=(fn,ms)=>{ const id=setTimeout(fn,ms);  ch.timers.push(id); return id; };

  // Delay first challenge slightly so player can settle in
  switch(mapId) {
    case 'ocean':
      to(()=>chSpawnCrate(),4000);
      iv(()=>chSpawnCrate(),7000);
      break;
    case 'earth':
      to(()=>chSpawnBoulder(),4000);
      iv(()=>chSpawnBoulder(),5000);
      break;
    case 'moon':
      (function schedDrift() {
        const d=4000+Math.random()*3000;
        to(()=>{
          if(!state.ch||state.ch.type!=='moon') return;
          if(state.running&&!state.paused) { state.ch.driftPending=true; showBanner('LUNAR DRIFT!','#aaaaff',1500); }
          schedDrift();
        },d);
      })();
      break;
    case 'space':
      to(()=>chSpawnPortals(),2000);
      iv(()=>chSpawnPortals(),13000);
      break;
    case 'desert':
      to(()=>chTriggerHeatwave(),9000);
      iv(()=>chTriggerHeatwave(),11000);
      break;
    case 'arctic':
      to(()=>chTriggerIceSlow(),6000);
      iv(()=>chTriggerIceSlow(),7000);
      break;
    case 'lava':
      to(()=>chSpawnLava(),3000);
      iv(()=>chSpawnLava(),7000);
      break;
    case 'city':
      to(()=>chSpawnSpeedTile(),4000);
      iv(()=>chSpawnSpeedTile(),5500);
      break;
    case 'jungle':
      to(()=>chSpawnVine(),5000);
      iv(()=>chSpawnVine(),8000);
      break;
  }
}

function stopChallenge() {
  if (!state.ch) return;
  state.ch.timers.forEach(id=>{ clearTimeout(id); clearInterval(id); });
  state.ch=null;
  const b=document.getElementById('challenge-banner');
  if (b) b.classList.add('hidden');
}

function showBanner(text, color, duration=2000) {
  const b=document.getElementById('challenge-banner');
  b.textContent=text; b.style.borderColor=color; b.style.color=color;
  b.classList.remove('hidden');
  if (state.ch) {
    clearTimeout(state.ch.bannerTimer);
    state.ch.bannerTimer=setTimeout(()=>b.classList.add('hidden'), duration);
  }
}

// Returns true if cell is a lethal/blocking challenge obstacle
function isChallengeLethal(x,y) {
  if (!state.ch) return false;
  const ch=state.ch;
  if (ch.boulders.some(b=>b.x===x&&b.y===y)) return true;
  if (ch.lavaZones.some(l=>l.x===x&&l.y===y)) return true;
  if (ch.vines.some(v=>v.cells.some(c=>c.x===x&&c.y===y))) return true;
  return false;
}

// Returns a random cell not occupied by snake, food, or challenge objects
function randomEmptyCell() {
  const occ=new Set(state.snake.map(s=>`${s.x},${s.y}`));
  occ.add(`${state.food.x},${state.food.y}`);
  if (state.ch) {
    const ch=state.ch;
    ch.boulders.forEach(b=>occ.add(`${b.x},${b.y}`));
    ch.lavaZones.forEach(l=>occ.add(`${l.x},${l.y}`));
    ch.vines.forEach(v=>v.cells.forEach(c=>occ.add(`${c.x},${c.y}`)));
    ch.crates.forEach(c=>occ.add(`${c.x},${c.y}`));
    ch.speedTiles.forEach(t=>occ.add(`${t.x},${t.y}`));
    if (ch.portals) ch.portals.forEach(p=>occ.add(`${p.x},${p.y}`));
  }
  const free=[];
  for(let x=0;x<GRID;x++) for(let y=0;y<GRID;y++) if(!occ.has(`${x},${y}`)) free.push({x,y});
  return free.length ? free[Math.floor(Math.random()*free.length)] : null;
}

// ── Ocean: Current Crates ──
function chSpawnCrate() {
  if (!state.ch||!state.running||state.paused) return;
  if (state.ch.crates.length>=3) state.ch.crates.shift();
  const cell=randomEmptyCell(); if(!cell) return;
  state.ch.crates.push({...cell, expires:Date.now()+15000});
  showBanner('CURRENT CRATE!','#f0a820',1800);
}

// ── Earth: Boulders ──
function chSpawnBoulder() {
  if (!state.ch||!state.running||state.paused) return;
  if (state.ch.boulders.length>=5) state.ch.boulders.shift();
  const cell=randomEmptyCell(); if(!cell) return;
  state.ch.boulders.push({...cell});
  showBanner('BOULDER!','#888888',1500);
}

// ── Space: Wormholes ──
function chSpawnPortals() {
  if (!state.ch||!state.running) return;
  const a=randomEmptyCell(); if(!a) return;
  const b=randomEmptyCell(); if(!b||b.x===a.x&&b.y===a.y) return;
  state.ch.portals=[{...a},{...b}];
  showBanner('WORMHOLES SHIFTED!','#c080ff',1800);
}

// ── Desert: Heatwave ──
function chTriggerHeatwave() {
  if (!state.ch||!state.running||state.paused||state.ch.heatwave) return;
  state.ch.heatwave=true;
  showBanner('HEATWAVE! CONTROLS REVERSED','#ff7040',3500);
  const id=setTimeout(()=>{ if(state.ch) state.ch.heatwave=false; },3000);
  state.ch.timers.push(id);
}

// ── Arctic: Ice Slow ──
function chTriggerIceSlow() {
  if (!state.ch||!state.running||state.paused||state.ch.slowActive) return;
  state.ch.slowActive=true;
  const slowSpeed=state.ch.baseSpeed*2.3;
  restartTick(slowSpeed);
  showBanner('ICE PATCH — SLOWED','#80c8ff',2800);
  const id=setTimeout(()=>{
    if (!state.ch) return;
    state.ch.slowActive=false;
    restartTick(state.ch.baseSpeed);
  },2500);
  state.ch.timers.push(id);
}

// ── Lava: Lava Zones ──
function chSpawnLava() {
  if (!state.ch||!state.running||state.paused) return;
  state.ch.lavaZones=[];
  for (let i=0;i<2;i++) { const c=randomEmptyCell(); if(c) state.ch.lavaZones.push({...c}); }
  showBanner('LAVA ZONES SHIFTED!','#ff4400',1800);
}

// ── City: Speed Tiles ──
function chSpawnSpeedTile() {
  if (!state.ch||!state.running||state.paused) return;
  if (state.ch.speedTiles.length>=2) state.ch.speedTiles.shift();
  const cell=randomEmptyCell(); if(!cell) return;
  const type=Math.random()>.35?'fast':'slow';
  state.ch.speedTiles.push({...cell,type,expires:Date.now()+10000});
  showBanner(type==='fast'?'SPEED ZONE!':'RED LIGHT!', type==='fast'?'#ffe040':'#ff4040',1500);
}

function chEatSpeedTile(tile) {
  if (!state.ch) return;
  state.ch.speedTiles=state.ch.speedTiles.filter(t=>t!==tile);
  if (tile.type==='fast') {
    showBanner('SPEED BOOST!','#ffe040',3200);
    const spd=Math.max(40,state.ch.baseSpeed*.5);
    restartTick(spd);
    const id=setTimeout(()=>{ if(state.ch){restartTick(state.ch.baseSpeed);} },3000);
    state.ch.timers.push(id);
  } else {
    showBanner('RED LIGHT — SLOWED!','#ff4040',2500);
    restartTick(state.ch.baseSpeed*1.9);
    const id=setTimeout(()=>{ if(state.ch){restartTick(state.ch.baseSpeed);} },2200);
    state.ch.timers.push(id);
  }
}

// ── Jungle: Vine Walls ──
function chSpawnVine() {
  if (!state.ch||!state.running||state.paused) return;
  if (state.ch.vines.length>=2) state.ch.vines.shift();
  const len=3+Math.floor(Math.random()*2); // 3-4 cells
  const horiz=Math.random()>.5;
  const cells=[];
  const startX=1+Math.floor(Math.random()*(GRID-len-2));
  const startY=1+Math.floor(Math.random()*(GRID-len-2));
  for(let i=0;i<len;i++) {
    const c=horiz?{x:startX+i,y:startY}:{x:startX,y:startY+i};
    // Skip if occupied
    if(!state.snake.some(s=>s.x===c.x&&s.y===c.y)&&!(state.food.x===c.x&&state.food.y===c.y)) cells.push(c);
  }
  if (cells.length>=2) { state.ch.vines.push({cells,expires:Date.now()+12000}); showBanner('VINE WALL!','#40c020',1800); }
}

// Challenge check: expire timed items (called each gameTick)
function chTickCleanup() {
  if (!state.ch) return;
  const now=Date.now();
  if (state.ch.crates)     state.ch.crates     = state.ch.crates.filter(c=>c.expires>now);
  if (state.ch.speedTiles) state.ch.speedTiles  = state.ch.speedTiles.filter(t=>t.expires>now);
  if (state.ch.vines)      state.ch.vines       = state.ch.vines.filter(v=>v.expires>now);
}

// ── Challenge rendering ──
function renderChallenges(ctx, cell) {
  if (!state.ch) return;
  const ch=state.ch;

  // Ocean crates
  ch.crates.forEach(c=>{
    const cx=c.x*cell+cell/2, cy=c.y*cell+cell/2, s=cell*.64;
    ctx.fillStyle='#7a4a08'; roundRect(ctx,cx-s/2,cy-s/2,s,s,3); ctx.fill();
    ctx.strokeStyle='#d4900a'; ctx.lineWidth=1.5;
    roundRect(ctx,cx-s/2,cy-s/2,s,s,3); ctx.stroke();
    ctx.strokeStyle='rgba(212,144,10,.7)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-s*.28,cy-s*.28); ctx.lineTo(cx+s*.28,cy+s*.28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+s*.28,cy-s*.28); ctx.lineTo(cx-s*.28,cy+s*.28); ctx.stroke();
    // rope band
    ctx.strokeStyle='rgba(180,120,20,.5)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-s/2,cy); ctx.lineTo(cx+s/2,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-s/2); ctx.lineTo(cx,cy+s/2); ctx.stroke();
  });

  // Earth boulders
  ch.boulders.forEach(b=>{
    const bx=b.x*cell+cell/2, by=b.y*cell+cell/2, r=cell*.38;
    ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(bx,by,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#333'; ctx.beginPath(); ctx.ellipse(bx-r*.1,by-r*.1,r*.72,r*.68,.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.12)'; ctx.beginPath(); ctx.arc(bx-r*.3,by-r*.35,r*.18,0,Math.PI*2); ctx.fill();
  });

  // Space portals
  if (ch.portals) {
    const colors=[['#8030ff','#c080ff'],['#00bbff','#80ddff']];
    ch.portals.forEach((p,i)=>{
      const px=p.x*cell+cell/2, py=p.y*cell+cell/2, r=cell*.4;
      const [ic,oc]=colors[i];
      // Glow
      const g=ctx.createRadialGradient(px,py,0,px,py,r*1.6);
      g.addColorStop(0,oc+'55'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(px,py,r*1.6,0,Math.PI*2); ctx.fill();
      // Ring
      ctx.strokeStyle=oc; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.stroke();
      // Inner
      ctx.fillStyle=ic+'66'; ctx.beginPath(); ctx.arc(px,py,r*.55,0,Math.PI*2); ctx.fill();
      // Label
      ctx.fillStyle=oc; ctx.font=`bold ${cell*.25}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(i===0?'A':'B',px,py);
    });
  }

  // Desert heatwave shimmer
  if (ch.heatwave) {
    const alpha=0.06+0.04*Math.sin(Date.now()/60);
    ctx.fillStyle=`rgba(255,100,20,${alpha})`;
    ctx.fillRect(0,0,ctx.canvas.width,ctx.canvas.width);
  }

  // Arctic slow overlay
  if (ch.slowActive) {
    const alpha=0.07+0.03*Math.sin(Date.now()/200);
    ctx.fillStyle=`rgba(100,180,255,${alpha})`;
    ctx.fillRect(0,0,ctx.canvas.width,ctx.canvas.width);
  }

  // Lava zones
  const pulse=.5+.5*Math.sin(Date.now()/220);
  ch.lavaZones.forEach(lz=>{
    const lx=lz.x*cell+cell/2, ly=lz.y*cell+cell/2, r=cell*.36+cell*.08*pulse;
    const g=ctx.createRadialGradient(lx,ly,0,lx,ly,r*1.4);
    g.addColorStop(0,'rgba(255,200,0,.9)'); g.addColorStop(.4,'rgba(255,60,0,.8)'); g.addColorStop(1,'rgba(180,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(lx,ly,r*1.4,0,Math.PI*2); ctx.fill();
    // Skull indicator
    ctx.fillStyle='rgba(255,255,255,.6)'; ctx.font=`${cell*.32}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('✕',lx,ly);
  });

  // City speed tiles
  ch.speedTiles.forEach(st=>{
    const tx=st.x*cell+cell/2, ty=st.y*cell+cell/2, r=cell*.32;
    const p=.5+.5*Math.sin(Date.now()/280);
    const color=st.type==='fast'?`rgba(255,220,0,${.55+.35*p})`:`rgba(255,60,60,${.55+.35*p})`;
    const g=ctx.createRadialGradient(tx,ty,0,tx,ty,r*1.4);
    g.addColorStop(0,color); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(tx,ty,r*1.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=st.type==='fast'?'#ffe040':'#ff4040';
    ctx.font=`bold ${cell*.28}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(st.type==='fast'?'▶▶':'●',tx,ty);
  });

  // Jungle vines
  ch.vines.forEach(v=>{
    v.cells.forEach(vc=>{
      const vx=vc.x*cell, vy=vc.y*cell;
      ctx.fillStyle='rgba(25,85,10,.9)';
      roundRect(ctx,vx+2,vy+2,cell-4,cell-4,3); ctx.fill();
      ctx.strokeStyle='rgba(60,160,20,.6)'; ctx.lineWidth=1;
      roundRect(ctx,vx+2,vy+2,cell-4,cell-4,3); ctx.stroke();
      // Leaf dot
      ctx.fillStyle='rgba(70,180,30,.5)'; ctx.beginPath(); ctx.arc(vx+cell/2,vy+cell/2,cell*.14,0,Math.PI*2); ctx.fill();
    });
  });
}

// ════════════════════════════════════════════════════
//  GAME TICK
// ════════════════════════════════════════════════════

function gameTick() {
  if (state.paused || !state.running) return;
  chTickCleanup();
  const didDrift = state.ch?.driftPending;
  if (didDrift) state.ch.driftPending=false;
  if (!doMove()) return;
  if (didDrift && state.running) { state.nextDir={...state.dir}; doMove(); }
}

function doMove() {
  // Apply direction (with heatwave flip)
  let nd={...state.nextDir};
  if (state.ch?.heatwave) nd={x:-nd.x,y:-nd.y};
  // Prevent 180 reversal after flip
  if (nd.x!==0&&nd.x===-state.dir.x) nd={...state.dir};
  if (nd.y!==0&&nd.y===-state.dir.y) nd={...state.dir};
  state.dir=nd;

  let head={x:state.snake[0].x+state.dir.x, y:state.snake[0].y+state.dir.y};

  // Wall collision
  if (head.x<0||head.x>=GRID||head.y<0||head.y>=GRID) { triggerGameOver(); return false; }

  // Wormhole check (space)
  if (state.ch?.portals) {
    for(let i=0;i<state.ch.portals.length;i++) {
      const p=state.ch.portals[i];
      if (head.x===p.x&&head.y===p.y) {
        const other=state.ch.portals[1-i];
        const ex=other.x+state.dir.x, ey=other.y+state.dir.y;
        if (ex<0||ex>=GRID||ey<0||ey>=GRID) { triggerGameOver(); return false; }
        head={x:ex,y:ey};
        showBanner('WORMHOLE!','#c080ff',1200);
        break;
      }
    }
  }

  // Self collision
  if (state.snake.some(s=>s.x===head.x&&s.y===head.y)) { triggerGameOver(); return false; }

  // Lethal challenge obstacle
  if (isChallengeLethal(head.x,head.y)) { triggerGameOver(); return false; }

  const canvas=document.getElementById('game-canvas');
  const cell=canvas.width/GRID;
  state.lastTailPos={x:state.snake[state.snake.length-1].x*cell+cell*.5,y:state.snake[state.snake.length-1].y*cell+cell*.5};

  const ate=(head.x===state.food.x&&head.y===state.food.y);

  // Ocean crate check
  const crateIdx=state.ch?.crates?state.ch.crates.findIndex(c=>c.x===head.x&&c.y===head.y):-1;

  state.snake.unshift(head);

  if (ate) {
    state.score++;
    document.getElementById('hud-value').textContent=state.score;
    if (state.mode==='levels'&&state.score>=state.currentLevel.target) { triggerLevelWin(); return false; }
    // Free play speed progression every 5 lamps
    if (state.mode==='free'&&state.score%5===0&&state.ch) {
      state.ch.baseSpeed=Math.max(70,state.ch.baseSpeed-4);
      if (!state.ch.slowActive) restartTick(state.ch.baseSpeed);
    }
    spawnBurstParticles({x:state.food.x*cell+cell*.5,y:state.food.y*cell+cell*.5});
    spawnFood();
  } else if (crateIdx>=0) {
    // Eat ocean crate
    state.ch.crates.splice(crateIdx,1);
    state.ch.rapidGrowthUntil=Date.now()+3000;
    showBanner('GROWTH BURST! +3s','#f0a820',2200);
    spawnBurstParticles({x:head.x*cell+cell*.5,y:head.y*cell+cell*.5});
    // Don't pop tail (snake grows)
  } else {
    // Check city speed tile
    if (state.ch?.speedTiles) {
      const tIdx=state.ch.speedTiles.findIndex(t=>t.x===head.x&&t.y===head.y);
      if (tIdx>=0) { chEatSpeedTile(state.ch.speedTiles[tIdx]); }
    }
    // Grow or move normally
    if (state.ch?.rapidGrowthUntil&&Date.now()<state.ch.rapidGrowthUntil) {
      // Rapid growth: don't pop tail
    } else {
      state.snake.pop();
      spawnTrailParticles(state.lastTailPos);
    }
  }
  return true;
}

// ════════════════════════════════════════════════════
//  RENDER LOOP
// ════════════════════════════════════════════════════

let lastRafTime=0;
function startRenderLoop() {
  if (state.rafId) cancelAnimationFrame(state.rafId);
  lastRafTime=0;
  function loop(ts) {
    state.rafId=requestAnimationFrame(loop);
    const dt=lastRafTime===0?16:Math.min(ts-lastRafTime,50);
    lastRafTime=ts; renderFrame(dt);
  }
  state.rafId=requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════════════════════

function spawnTrailParticles(pos) {
  const mid=state.currentMap?.id; if(!mid||!MAP_PARTICLE_CONFIG[mid]) return;
  const cfg=MAP_PARTICLE_CONFIG[mid];
  for(let i=0;i<cfg.count;i++) state.particles.push(cfg.create(pos.x,pos.y,state.dir));
}
function spawnBurstParticles(pos) {
  const mid=state.currentMap?.id; if(!mid||!MAP_PARTICLE_CONFIG[mid]) return;
  const cfg=MAP_PARTICLE_CONFIG[mid];
  for(let i=0;i<cfg.count*3;i++) {
    const p=cfg.create(pos.x,pos.y,state.dir);
    p.decay*=.6; const a=Math.random()*Math.PI*2,spd=Math.random()*2.5+.5;
    p.vx=Math.cos(a)*spd; p.vy=Math.sin(a)*spd;
    state.particles.push(p);
  }
}
function updateParticles(dt) {
  const sc=dt/16;
  for(let i=state.particles.length-1;i>=0;i--) {
    const p=state.particles[i];
    p.x+=p.vx*sc; p.y+=p.vy*sc; p.vy+=(p.gravity||0)*sc; p.life-=p.decay*sc;
    if(p.life<=0) state.particles.splice(i,1);
  }
}
function drawParticles(ctx) {
  state.particles.forEach(p=>{
    const a=Math.max(0,p.life)*.7;
    if(p.ring){ctx.strokeStyle=`rgba(${p.r|0},${p.g|0},${p.b|0},${a})`;ctx.lineWidth=.8;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.stroke();}
    else{ctx.fillStyle=`rgba(${p.r|0},${p.g|0},${p.b|0},${a})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
  });
}

// ════════════════════════════════════════════════════
//  FOOD
// ════════════════════════════════════════════════════

function spawnFood() {
  const free=[];
  for(let x=0;x<GRID;x++) for(let y=0;y<GRID;y++)
    if(!state.snake.some(s=>s.x===x&&s.y===y)&&!isChallengeLethal(x,y)) free.push({x,y});
  if(free.length) state.food=free[Math.floor(Math.random()*free.length)];
}

// ════════════════════════════════════════════════════
//  RENDERING
// ════════════════════════════════════════════════════

function renderFrame(dt=16) {
  const canvas=document.getElementById('game-canvas'); if(!canvas) return;
  const ctx=canvas.getContext('2d'); const W=canvas.width; const cell=W/GRID;

  ctx.clearRect(0,0,W,W);

  // Grid lines
  const mid=state.currentMap?.id;
  ctx.strokeStyle=(mid&&MAP_GRID_COLOR[mid])||'rgba(255,255,255,.04)';
  ctx.lineWidth=.5;
  for(let i=1;i<GRID;i++){ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,W);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(W,i*cell);ctx.stroke();}

  // Particles (behind everything)
  updateParticles(dt); drawParticles(ctx);

  // Challenge elements (above particles, below snake)
  renderChallenges(ctx,cell);

  // Snake
  drawSnake(ctx,cell);

  // Lamp
  drawLamp(ctx,state.food.x,state.food.y,cell);
}

function drawSnake(ctx,cell) {
  const color=state.snakeColor;
  state.snake.forEach((seg,i)=>{
    const x=seg.x*cell,y=seg.y*cell,pad=i===0?1:2;
    ctx.fillStyle=i===0?lighten(color,.3):fadeColor(color,1-(i/state.snake.length)*.45);
    roundRect(ctx,x+pad,y+pad,cell-pad*2,cell-pad*2,4); ctx.fill();
    if(i===0){
      ctx.fillStyle='rgba(0,0,0,.7)';
      const ey=cell*.12,d=state.dir;
      if(d.x===1) {ctx.beginPath();ctx.arc(x+cell*.72,y+cell*.3,ey,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+cell*.72,y+cell*.7,ey,0,Math.PI*2);ctx.fill();}
      else if(d.x===-1){ctx.beginPath();ctx.arc(x+cell*.28,y+cell*.3,ey,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+cell*.28,y+cell*.7,ey,0,Math.PI*2);ctx.fill();}
      else if(d.y===-1){ctx.beginPath();ctx.arc(x+cell*.3,y+cell*.28,ey,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+cell*.7,y+cell*.28,ey,0,Math.PI*2);ctx.fill();}
      else{ctx.beginPath();ctx.arc(x+cell*.3,y+cell*.72,ey,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+cell*.7,y+cell*.72,ey,0,Math.PI*2);ctx.fill();}
    }
  });
}

function drawLamp(ctx,gx,gy,cell) {
  const x=gx*cell+cell*.5,y=gy*cell+cell*.5,r=cell*.42;
  const grad=ctx.createRadialGradient(x,y,0,x,y,r*1.7);
  grad.addColorStop(0,'rgba(255,220,80,.38)'); grad.addColorStop(.5,'rgba(255,180,0,.12)'); grad.addColorStop(1,'rgba(255,160,0,0)');
  ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(x,y,r*1.7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffe066'; ctx.beginPath(); ctx.arc(x,y-r*.08,r*.55,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,200,.92)'; ctx.beginPath(); ctx.arc(x,y-r*.08,r*.28,0,Math.PI*2); ctx.fill();
  const bw=r*.6,bh=r*.22,by=y+r*.5;
  ctx.fillStyle='#b8860b'; roundRect(ctx,x-bw/2,by,bw,bh,2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=1;
  for(let i=0;i<3;i++){const ly=by+bh*(.25+i*.25);ctx.beginPath();ctx.moveTo(x-bw/2+2,ly);ctx.lineTo(x+bw/2-2,ly);ctx.stroke();}
  ctx.fillStyle='rgba(255,255,255,.55)'; ctx.beginPath(); ctx.arc(x-r*.18,y-r*.28,r*.1,0,Math.PI*2); ctx.fill();
}

// ════════════════════════════════════════════════════
//  GAME OVER / WIN
// ════════════════════════════════════════════════════

function triggerGameOver() {
  const newRecord=saveHS(); updateHudBest();
  stopGame();
  document.getElementById('overlay-title').textContent='Game Over';
  document.getElementById('overlay-title').className='overlay-title';
  document.getElementById('overlay-record').className='overlay-record'+(newRecord?'':' hidden');
  document.getElementById('overlay-score').textContent=state.score;
  document.getElementById('overlay-sub').textContent=state.score===1?'lamp collected':'lamps collected';
  const btns=document.getElementById('overlay-buttons'); btns.innerHTML='';
  addOBtn(btns,'Play Again','btn-primary',()=>initGame());
  addOBtn(btns,'Maps','btn-secondary',()=>goToMapSelect(state.mode));
  addOBtn(btns,'Home','btn-ghost',()=>showView('home'));
  document.getElementById('game-overlay').classList.remove('hidden');
}

function triggerLevelWin() {
  stopGame();
  const isLast=state.currentLevel.num===LEVELS.length;
  document.getElementById('overlay-title').textContent=isLast?'Map Complete!':'Level Clear!';
  document.getElementById('overlay-title').className='overlay-title'+(isLast?' gold':'');
  document.getElementById('overlay-record').className='overlay-record hidden';
  document.getElementById('overlay-score').textContent=state.score;
  document.getElementById('overlay-sub').textContent='lamps collected';
  const btns=document.getElementById('overlay-buttons'); btns.innerHTML='';
  if(!isLast){ const next=LEVELS[state.currentLevel.num]; addOBtn(btns,'Next Level','btn-primary',()=>startLevel(next)); }
  addOBtn(btns,'Replay','btn-secondary',()=>initGame());
  addOBtn(btns,'Maps','btn-ghost',()=>showView('map'));
  document.getElementById('game-overlay').classList.remove('hidden');
}

function addOBtn(container,label,cls,fn) {
  const btn=document.createElement('button'); btn.className='btn '+cls;
  btn.textContent=label; btn.onclick=fn; container.appendChild(btn);
}

// ════════════════════════════════════════════════════
//  PAUSE
// ════════════════════════════════════════════════════

function togglePause() {
  if (!state.running) return;
  state.paused=!state.paused;
  const btn=document.getElementById('pause-btn');
  const overlay=document.getElementById('game-overlay');
  if (state.paused) {
    btn.textContent='Resume';
    document.getElementById('overlay-title').textContent='Paused';
    document.getElementById('overlay-title').className='overlay-title';
    document.getElementById('overlay-record').className='overlay-record hidden';
    document.getElementById('overlay-score').textContent=state.score;
    document.getElementById('overlay-sub').textContent='lamps so far';
    const btns=document.getElementById('overlay-buttons'); btns.innerHTML='';
    addOBtn(btns,'Resume','btn-primary',()=>{
      state.paused=false; btn.textContent='Pause'; overlay.classList.add('hidden');
    });
    addOBtn(btns,'Home','btn-ghost',()=>{ saveHS(); updateHudBest(); goHome(); });
    overlay.classList.remove('hidden');
  } else {
    btn.textContent='Pause'; overlay.classList.add('hidden');
  }
}

// ════════════════════════════════════════════════════
//  NAV / INPUT
// ════════════════════════════════════════════════════

function goHome() { stopGame(); showView('home'); }

const DIR_MAP={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},W:{x:0,y:-1},s:{x:0,y:1},S:{x:0,y:1},a:{x:-1,y:0},A:{x:-1,y:0},d:{x:1,y:0},D:{x:1,y:0}};
const DPAD_MAP={UP:{x:0,y:-1},DOWN:{x:0,y:1},LEFT:{x:-1,y:0},RIGHT:{x:1,y:0}};

function queueDir(d) {
  if(d.x!==0&&d.x===-state.dir.x) return;
  if(d.y!==0&&d.y===-state.dir.y) return;
  state.nextDir=d;
}
document.addEventListener('keydown',(e)=>{
  if(e.key===' '||e.key==='Escape'){
    const v=document.querySelector('[data-view].active');
    if(v&&v.id==='view-game'){togglePause();return;}
  }
  const d=DIR_MAP[e.key];
  if(d){e.preventDefault();queueDir(d);if(state.paused&&state.running){state.paused=false;document.getElementById('pause-btn').textContent='Pause';document.getElementById('game-overlay').classList.add('hidden');}}
});
function dpadPress(dir) {
  const d=DPAD_MAP[dir]; if(!d) return; queueDir(d);
  if(state.paused&&state.running){state.paused=false;document.getElementById('pause-btn').textContent='Pause';document.getElementById('game-overlay').classList.add('hidden');}
}
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const v=document.querySelector('[data-view].active'); if(!v||v.id!=='view-game') return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20) return;
  queueDir(Math.abs(dx)>Math.abs(dy)?(dx>0?{x:1,y:0}:{x:-1,y:0}):(dy>0?{x:0,y:1}:{x:0,y:-1}));
},{passive:true});

// ════════════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════════════

let modalResolve=()=>{};
function showConfirm(title,body,confirmLabel='Confirm',cancelLabel='Cancel') {
  return new Promise(resolve=>{
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-body').textContent=body;
    document.getElementById('modal-confirm').textContent=confirmLabel;
    document.getElementById('modal-cancel').textContent=cancelLabel;
    document.getElementById('modal').classList.remove('hidden');
    modalResolve=(val)=>{document.getElementById('modal').classList.add('hidden');resolve(val);};
  });
}

// ════════════════════════════════════════════════════
//  CANVAS HELPERS
// ════════════════════════════════════════════════════

function roundRect(ctx,x,y,w,h,r) {
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function lighten(hex,amount){const[r,g,b]=hexToRgb(hex);return`rgb(${Math.min(255,r+255*amount)|0},${Math.min(255,g+255*amount)|0},${Math.min(255,b+255*amount)|0})`;}
function fadeColor(hex,alpha){const[r,g,b]=hexToRgb(hex);return`rgba(${r},${g},${b},${alpha})`;}
function hexToRgb(hex){const h=hex.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}

// ════════════════════════════════════════════════════
//  RESIZE / BOOT
// ════════════════════════════════════════════════════

window.addEventListener('resize',()=>{
  if(state.running){const c=document.getElementById('game-canvas');const s=c.parentElement.clientWidth;c.width=c.height=s;}
});

(function boot(){
  initHome(); initMapGrid(); runSplash();
})();
</script>
