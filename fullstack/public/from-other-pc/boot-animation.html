<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Red Boot Animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0b0b0b;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Scan-line overlay ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.12) 2px,
                rgba(0,0,0,0.12) 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        /* ── Container ── */
        .boot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            user-select: none;
        }

        /* ── Ring assembly ── */
        .ring-wrap {
            position: relative;
            width: 130px;
            height: 130px;
        }

        /* Expanding pulse rings */
        .pulse {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(255, 26, 46, 0.55);
            animation: pulse 2.2s ease-out infinite;
        }
        .pulse:nth-child(2) { animation-delay: 0.73s; }
        .pulse:nth-child(3) { animation-delay: 1.46s; }

        /* Outer spinner */
        .spinner-outer {
            position: absolute;
            inset: 14px;
            border-radius: 50%;
            border: 2px solid rgba(255, 26, 46, 0.12);
            border-top-color: #ff1a2e;
            border-right-color: rgba(255, 26, 46, 0.45);
            animation: spin 0.9s linear infinite;
            filter: drop-shadow(0 0 6px rgba(255, 26, 46, 0.6));
        }

        /* Inner counter-spinner */
        .spinner-inner {
            position: absolute;
            inset: 26px;
            border-radius: 50%;
            border: 1px solid rgba(255, 26, 46, 0.08);
            border-bottom-color: rgba(255, 26, 46, 0.55);
            border-left-color: rgba(255, 26, 46, 0.2);
            animation: spin 1.5s linear infinite reverse;
        }

        /* Static track ring */
        .track {
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* Centre dot */
        .dot {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #ff1a2e;
            animation: dotPulse 1s ease-in-out infinite alternate;
        }

        /* ── Title ── */
        .title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }
        .title .accent {
            color: #ff1a2e;
            text-shadow: 0 0 14px rgba(255, 26, 46, 0.85);
        }

        /* ── Status text ── */
        .status {
            font-family: 'Cascadia Code', 'Fira Code', 'SF Mono', Consolas, monospace;
            font-size: 11px;
            color: #505050;
            letter-spacing: 0.07em;
            min-height: 16px;
            text-align: center;
        }

        /* ── Progress bar ── */
        .bar-track {
            width: 200px;
            height: 2px;
            background: #1c1c1c;
            border-radius: 2px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            width: 0%;
            background: #ff1a2e;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(255, 26, 46, 0.75);
            transition: width 0.12s linear;
        }

        /* ── Keyframes ── */
        @keyframes pulse {
            0%   { transform: scale(1);   opacity: 0.7; }
            100% { transform: scale(2.6); opacity: 0;   }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        @keyframes dotPulse {
            from {
                box-shadow: 0 0 8px  rgba(255,26,46,0.7), 0 0 20px rgba(255,26,46,0.25);
                transform: translate(-50%,-50%) scale(1);
            }
            to {
                box-shadow: 0 0 20px rgba(255,26,46,1),   0 0 44px rgba(255,26,46,0.45);
                transform: translate(-50%,-50%) scale(1.2);
            }
        }

        /* ── Replay button (shows after animation ends) ── */
        .replay {
            display: none;
            margin-top: 8px;
            padding: 6px 20px;
            background: transparent;
            border: 1px solid rgba(255,26,46,0.4);
            border-radius: 4px;
            color: #ff1a2e;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.06em;
            transition: all 0.15s;
        }
        .replay:hover {
            background: rgba(255,26,46,0.08);
            box-shadow: 0 0 12px rgba(255,26,46,0.4);
            color: #fff;
        }
        .replay.visible { display: block; }
    </style>
</head>
<body>

<div class="boot" id="boot">
    <div class="ring-wrap">
        <div class="pulse"></div>
        <div class="pulse"></div>
        <div class="pulse"></div>
        <div class="track"></div>
        <div class="spinner-outer"></div>
        <div class="spinner-inner"></div>
        <div class="dot"></div>
    </div>

    <div class="title"><span class="accent">Claude</span> Manager</div>
    <div class="status" id="status">Initializing...</div>

    <div class="bar-track">
        <div class="bar-fill" id="bar"></div>
    </div>

    <button class="replay" id="replayBtn" onclick="runAnimation()">Replay</button>
</div>

<script>
    const steps = [
        { pct: 10,  msg: 'Initializing...'        },
        { pct: 28,  msg: 'Loading storage...'      },
        { pct: 48,  msg: 'Restoring instances...'  },
        { pct: 65,  msg: 'Mounting sub-agents...'  },
        { pct: 82,  msg: 'Preparing charts...'     },
        { pct: 95,  msg: 'Checking for updates...' },
        { pct: 100, msg: 'Ready.'                  },
    ];

    const statusEl = document.getElementById('status');
    const barEl    = document.getElementById('bar');
    const replayBtn = document.getElementById('replayBtn');
    let timer = null;

    function runAnimation() {
        replayBtn.classList.remove('visible');
        barEl.style.transition = 'none';
        barEl.style.width = '0%';
        statusEl.textContent = '';

        // Force reflow so the 0% reset takes effect before transitions resume
        barEl.offsetWidth;
        barEl.style.transition = 'width 0.12s linear';

        let i = 0;
        clearTimeout(timer);

        function tick() {
            if (i >= steps.length) {
                setTimeout(() => replayBtn.classList.add('visible'), 600);
                return;
            }
            const s = steps[i++];
            barEl.style.width    = s.pct + '%';
            statusEl.textContent = s.msg;
            const delay = i === steps.length
                ? 220
                : 130 + Math.random() * 90;
            timer = setTimeout(tick, delay);
        }

        timer = setTimeout(tick, 350);
    }

    runAnimation();
</script>
</body>
</html>
