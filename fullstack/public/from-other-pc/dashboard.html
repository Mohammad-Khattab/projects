<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyDash</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --glass: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.09);
      --accent: #4f8ef7;
      --accent2: #8a4ff7;
      --text: #e6edf3;
      --muted: #8b949e;
      --danger: #f85149;
      --success: #3fb950;
      --warning: #d29922;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      background-image:
        radial-gradient(ellipse at 15% 60%, rgba(79,142,247,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(138,79,247,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 100%, rgba(56,189,175,0.05) 0%, transparent 50%);
      transition: background-image 0.5s;
    }

    /* ── Top bar ────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glass-border);
      position: sticky;
      top: 0;
      z-index: 200;
      gap: 16px;
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(79,142,247,0.3);
    }

    .logo-text {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .search-wrap {
      flex: 1; max-width: 340px;
      display: flex; align-items: center;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 9px 14px;
      gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap:focus-within {
      border-color: rgba(79,142,247,0.5);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
    }
    .search-wrap svg { flex-shrink: 0; opacity: 0.5; }
    .search-wrap input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: 14px; width: 100%;
    }
    .search-wrap input::placeholder { color: var(--muted); }

    .topbar-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

    .topbar-btn {
      width: 36px; height: 36px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      cursor: pointer; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all 0.15s;
    }
    .topbar-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .clock { text-align: right; }
    .clock-time { font-size: 18px; font-weight: 600; line-height: 1.1; }
    .clock-date { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ── Main ───────────────────────────────────── */
    .main {
      padding: 32px 28px;
      max-width: 1500px;
      margin: 0 auto;
    }

    /* ── Section ────────────────────────────────── */
    .section { margin-bottom: 40px; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 12px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── App grid ───────────────────────────────── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }

    /* ── App card ───────────────────────────────── */
    .app-card {
      position: relative;
      background: var(--glass);
      border: 1px solid var(--card-border, var(--glass-border));
      border-radius: 18px;
      padding: 22px 14px 18px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s, background 0.15s, border-color 0.15s;
      user-select: none;
      overflow: hidden;
    }
    .app-card::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--card-glow, transparent);
      opacity: 0; transition: opacity 0.2s;
      border-radius: inherit;
      pointer-events: none;
    }
    .app-card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35), 0 0 0 1px var(--card-border, rgba(255,255,255,0.12));
      background: rgba(255,255,255,0.08);
    }
    .app-card:hover::before { opacity: 1; }
    .app-card:active { transform: translateY(-2px) scale(1.01); }

    .app-icon {
      width: 68px; height: 68px;
      border-radius: 16px;
      margin: 0 auto 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      background: var(--card-icon-bg, rgba(79,142,247,0.18));
      border: 1px solid var(--card-border, rgba(255,255,255,0.08));
      overflow: hidden;
      flex-shrink: 0;
    }
    .app-icon img {
      width: 42px; height: 42px;
      object-fit: contain;
      border-radius: 6px;
    }

    .app-name {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.3;
    }
    .app-url {
      font-size: 11px; color: var(--muted);
      margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* status dot */
    .status-dot {
      position: absolute; top: 10px; left: 10px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      border: 1.5px solid var(--surface);
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--success); box-shadow: 0 0 6px rgba(63,185,80,0.6); }

    /* card actions */
    .card-actions {
      position: absolute; top: 8px; right: 8px;
      display: flex; gap: 4px;
      opacity: 0; transition: opacity 0.15s;
    }
    .app-card:hover .card-actions { opacity: 1; }

    .card-btn {
      width: 26px; height: 26px;
      border-radius: 8px; border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      transition: all 0.15s;
      backdrop-filter: blur(8px);
    }
    .card-btn-edit   { background: rgba(79,142,247,0.25); color: var(--accent); }
    .card-btn-edit:hover { background: rgba(79,142,247,0.45); }
    .card-btn-delete { background: rgba(248,81,73,0.25); color: var(--danger); }
    .card-btn-delete:hover { background: rgba(248,81,73,0.45); }

    /* ── Add placeholder card ────────────────────── */
    .add-card {
      background: transparent;
      border: 2px dashed var(--glass-border);
      border-radius: 18px;
      padding: 22px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 140px; gap: 8px;
      color: var(--muted); font-size: 13px;
    }
    .add-card:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(79,142,247,0.05);
    }
    .add-card-plus { font-size: 30px; line-height: 1; }

    /* ── Global add button ───────────────────────── */
    .btn-add {
      display: flex; align-items: center; gap: 7px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; border: none;
      border-radius: 11px; padding: 9px 18px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(79,142,247,0.25);
    }
    .btn-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(79,142,247,0.4);
      filter: brightness(1.1);
    }

    /* ── Empty state ─────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state-icon { font-size: 72px; margin-bottom: 20px; opacity: 0.35; }
    .empty-state-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-state-sub { font-size: 14px; margin-bottom: 24px; }

    /* ── Modal ───────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface2);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      padding: 28px;
      width: 440px; max-width: 100%;
      box-shadow: 0 32px 100px rgba(0,0,0,0.6);
      transform: scale(0.94) translateY(16px);
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 9px; width: 32px; height: 32px;
      cursor: pointer; color: var(--muted); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { background: rgba(248,81,73,0.2); color: var(--danger); border-color: rgba(248,81,73,0.4); }

    /* form */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.04em; }

    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 11px;
      padding: 10px 14px;
      color: var(--text); font-size: 14px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: rgba(79,142,247,0.5);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
    }
    .form-input::placeholder { color: var(--muted); }

    .input-row { display: flex; gap: 8px; }
    .input-row .form-input { flex: 1; }

    .btn-secondary {
      background: rgba(79,142,247,0.12);
      border: 1px solid rgba(79,142,247,0.25);
      border-radius: 10px; padding: 10px 14px;
      color: var(--accent); font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      transition: all 0.15s; flex-shrink: 0;
    }
    .btn-secondary:hover { background: rgba(79,142,247,0.25); }

    /* icon preview */
    .icon-preview-wrap { display: flex; gap: 10px; align-items: center; }
    .icon-preview {
      width: 52px; height: 52px; flex-shrink: 0;
      border-radius: 13px;
      background: rgba(79,142,247,0.15);
      border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; overflow: hidden;
    }
    .icon-preview img { width: 36px; height: 36px; object-fit: contain; }

    /* color picker */
    .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .swatch {
      width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer; border: 2.5px solid transparent;
      transition: all 0.15s;
    }
    .swatch.active {
      border-color: white;
      transform: scale(1.2);
      box-shadow: 0 0 8px currentColor;
    }

    /* modal footer */
    .modal-footer { display: flex; gap: 10px; margin-top: 24px; }
    .btn-cancel {
      flex: 1;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 11px; padding: 12px;
      color: var(--muted); font-size: 14px; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .btn-save {
      flex: 2;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 11px; padding: 12px;
      color: white; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      box-shadow: 0 2px 12px rgba(79,142,247,0.3);
    }
    .btn-save:hover { filter: brightness(1.1); box-shadow: 0 4px 20px rgba(79,142,247,0.5); }

    /* ── Settings panel ──────────────────────────── */
    .settings-panel {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 300px;
      background: var(--surface2);
      border-left: 1px solid var(--glass-border);
      z-index: 400;
      padding: 24px 20px;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
    }
    .settings-panel.open { transform: translateX(0); }

    .settings-title { font-size: 16px; font-weight: 700; margin-bottom: 24px; }

    .settings-section { margin-bottom: 28px; }
    .settings-section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }

    .bg-presets { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .bg-preset {
      height: 56px; border-radius: 12px; cursor: pointer;
      border: 2px solid transparent; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.7);
    }
    .bg-preset:hover { border-color: rgba(255,255,255,0.3); transform: scale(1.03); }
    .bg-preset.active { border-color: white; }

    .settings-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 9px; width: 32px; height: 32px;
      cursor: pointer; color: var(--muted); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .settings-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ── Toast ───────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--glass-border);
      border-radius: 12px; padding: 13px 18px;
      font-size: 13px; z-index: 9999;
      transform: translateY(60px); opacity: 0;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      max-width: 300px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--accent); }

    /* ── Scrollbar ───────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 600px) {
      .topbar { padding: 12px 16px; }
      .main { padding: 20px 16px; }
      .logo-text { display: none; }
      .search-wrap { max-width: 200px; }
      .app-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
    }
  </style>
  <script>
    (function() {
      var apps = JSON.parse(localStorage.getItem('mydash-apps') || '[]');
      var seeds = [
        { id: 'seed-xo-game',       name: 'XO Game',       url: 'file:///c:/Claude Code Test 1/from-other-pc/Projects/xo-game.html', icon: '⭕', category: 'Games',        color: 1, added: Date.now() },
        { id: 'seed-snake',         name: 'Snake',         url: 'file:///c:/Claude Code Test 1/from-other-pc/Projects/snake/index.html', icon: '🐍', category: 'Games',        color: 4, added: Date.now() + 1 },
        { id: 'seed-gju-study-hub', name: 'GJU Study Hub', url: 'http://localhost:3001', icon: '◈', category: 'Productivity', color: 2, added: Date.now() + 2 }
      ];
      seeds.forEach(function(seed) {
        if (!apps.find(function(a) { return a.id === seed.id; })) apps.push(seed);
      });
      localStorage.setItem('mydash-apps', JSON.stringify(apps));
    })();
  </script>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">🏠</div>
    <span class="logo-text">MyDash</span>
  </div>

  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search apps… (Ctrl+K)" oninput="filterApps(this.value)">
  </div>

  <div class="topbar-right">
    <button class="topbar-btn" onclick="openModal()" title="Add App" style="color:var(--accent);">+</button>
    <button class="topbar-btn" onclick="toggleSettings()" title="Settings">⚙</button>
    <div class="clock">
      <div class="clock-time" id="clockTime">--:--</div>
      <div class="clock-date" id="clockDate">---</div>
    </div>
  </div>
</div>

<!-- ── Main ────────────────────────────────────── -->
<div class="main" id="main"></div>

<!-- ── Settings panel ──────────────────────────── -->
<div class="settings-panel" id="settingsPanel">
  <button class="settings-close" onclick="toggleSettings()">✕</button>
  <div class="settings-title">Settings</div>

  <div class="settings-section">
    <div class="settings-section-title">Background</div>
    <div class="bg-presets" id="bgPresets"></div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Danger Zone</div>
    <button onclick="clearAll()" style="width:100%;background:rgba(248,81,73,0.12);border:1px solid rgba(248,81,73,0.25);border-radius:10px;padding:10px;color:var(--danger);font-size:13px;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.background='rgba(248,81,73,0.25)'" onmouseout="this.style.background='rgba(248,81,73,0.12)'">
      🗑 Clear All Apps
    </button>
  </div>
</div>

<!-- ── Add/Edit Modal ──────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add App</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" class="form-input" id="fName" placeholder="Plex, Portainer, Home Assistant…">
    </div>

    <div class="form-group">
      <label class="form-label">URL</label>
      <div class="input-row">
        <input type="text" class="form-input" id="fUrl" placeholder="http://192.168.1.100:8096" oninput="onUrlInput()">
        <button class="btn-secondary" onclick="autoIcon()">Auto Icon</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Icon</label>
      <div class="icon-preview-wrap">
        <div class="icon-preview" id="iconPreview">🌐</div>
        <input type="text" class="form-input" id="fIcon" placeholder="Emoji or image URL" oninput="updatePreview()">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <input type="text" class="form-input" id="fCategory" placeholder="Media, Tools, Monitoring…" list="catList">
      <datalist id="catList"></datalist>
    </div>

    <div class="form-group">
      <label class="form-label">Card Color</label>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveApp()">Save App</button>
    </div>
  </div>
</div>

<!-- ── Toast ────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
  // ── Data ─────────────────────────────────────────
  const THEMES = [
    { name: 'Deep Space', style: 'radial-gradient(ellipse at 15% 60%,rgba(79,142,247,.07) 0%,transparent 55%),radial-gradient(ellipse at 85% 15%,rgba(138,79,247,.07) 0%,transparent 55%),radial-gradient(ellipse at 50% 100%,rgba(56,189,175,.05) 0%,transparent 50%)' },
    { name: 'Midnight', style: 'radial-gradient(ellipse at 50% 0%,rgba(138,79,247,.12) 0%,transparent 60%)' },
    { name: 'Ocean', style: 'radial-gradient(ellipse at 0% 100%,rgba(56,189,175,.12) 0%,transparent 60%),radial-gradient(ellipse at 100% 0%,rgba(79,142,247,.1) 0%,transparent 60%)' },
    { name: 'Ember', style: 'radial-gradient(ellipse at 0% 50%,rgba(248,81,73,.08) 0%,transparent 60%),radial-gradient(ellipse at 100% 50%,rgba(255,166,61,.07) 0%,transparent 60%)' },
    { name: 'Forest', style: 'radial-gradient(ellipse at 50% 100%,rgba(63,185,80,.1) 0%,transparent 60%),radial-gradient(ellipse at 50% 0%,rgba(56,189,175,.07) 0%,transparent 60%)' },
    { name: 'Void', style: 'none' },
  ];

  const THEME_COLORS = [
    { bg: 'rgba(79,142,247,.22)',  border: 'rgba(79,142,247,.35)',  icon: 'rgba(79,142,247,.18)',  glow: 'radial-gradient(circle at 50% 0%,rgba(79,142,247,.12),transparent 70%)',  dot: '#4f8ef7' },
    { bg: 'rgba(138,79,247,.22)', border: 'rgba(138,79,247,.35)', icon: 'rgba(138,79,247,.18)', glow: 'radial-gradient(circle at 50% 0%,rgba(138,79,247,.12),transparent 70%)', dot: '#8a4ff7' },
    { bg: 'rgba(63,185,80,.22)',  border: 'rgba(63,185,80,.35)',  icon: 'rgba(63,185,80,.18)',  glow: 'radial-gradient(circle at 50% 0%,rgba(63,185,80,.12),transparent 70%)',  dot: '#3fb950' },
    { bg: 'rgba(248,81,73,.22)',  border: 'rgba(248,81,73,.35)',  icon: 'rgba(248,81,73,.18)',  glow: 'radial-gradient(circle at 50% 0%,rgba(248,81,73,.12),transparent 70%)',  dot: '#f85149' },
    { bg: 'rgba(255,166,61,.22)', border: 'rgba(255,166,61,.35)', icon: 'rgba(255,166,61,.18)', glow: 'radial-gradient(circle at 50% 0%,rgba(255,166,61,.12),transparent 70%)', dot: '#ffa63d' },
    { bg: 'rgba(56,189,175,.22)', border: 'rgba(56,189,175,.35)', icon: 'rgba(56,189,175,.18)', glow: 'radial-gradient(circle at 50% 0%,rgba(56,189,175,.12),transparent 70%)', dot: '#38bdaf' },
    { bg: 'rgba(240,101,149,.22)',border: 'rgba(240,101,149,.35)',icon: 'rgba(240,101,149,.18)',glow: 'radial-gradient(circle at 50% 0%,rgba(240,101,149,.12),transparent 70%)',dot: '#f06595' },
    { bg: 'rgba(139,148,158,.22)',border: 'rgba(139,148,158,.35)',icon: 'rgba(139,148,158,.18)',glow: 'radial-gradient(circle at 50% 0%,rgba(139,148,158,.12),transparent 70%)',dot: '#8b949e' },
  ];

  let apps = JSON.parse(localStorage.getItem('mydash-apps') || '[]');
  let prefs = JSON.parse(localStorage.getItem('mydash-prefs') || '{"theme":0,"color":0}');
  let editId = null;
  let selectedColor = prefs.color || 0;

  // ── Boot ──────────────────────────────────────────
  function init() {
    updateClock(); setInterval(updateClock, 1000);
    applyTheme(prefs.theme || 0);
    renderBgPresets();
    renderSwatches();
    render();
  }

  // ── Clock ─────────────────────────────────────────
  function updateClock() {
    const d = new Date();
    document.getElementById('clockTime').textContent = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('clockDate').textContent = d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
  }

  // ── Theme ─────────────────────────────────────────
  function applyTheme(idx) {
    prefs.theme = idx;
    savePrefs();
    document.body.style.backgroundImage = THEMES[idx].style;
  }

  function renderBgPresets() {
    const el = document.getElementById('bgPresets');
    el.innerHTML = THEMES.map((t,i) => `
      <div class="bg-preset ${i === prefs.theme ? 'active' : ''}"
           style="background:${t.style === 'none' ? '#0d1117' : t.style.split(',')[0].replace('radial-gradient(ellipse','radial-gradient(circle').replace(' 0%,transparent 55%)',')')};background-color:#0d1117"
           onclick="selectTheme(${i})">${t.name}</div>
    `).join('');
  }

  function selectTheme(i) {
    applyTheme(i);
    renderBgPresets();
  }

  // ── Color swatches ────────────────────────────────
  function renderSwatches() {
    const el = document.getElementById('colorSwatches');
    el.innerHTML = THEME_COLORS.map((c,i) => `
      <div class="swatch ${i === selectedColor ? 'active' : ''}"
           style="background:${c.dot}"
           onclick="pickColor(${i})"></div>
    `).join('');
  }

  function pickColor(i) { selectedColor = i; renderSwatches(); }

  // ── Render ────────────────────────────────────────
  function render(filter = '') {
    const el = document.getElementById('main');
    let list = apps;
    if (filter) {
      const q = filter.toLowerCase();
      list = apps.filter(a =>
        a.name.toLowerCase().includes(q) ||
        (a.url||'').toLowerCase().includes(q) ||
        (a.category||'').toLowerCase().includes(q)
      );
    }

    if (apps.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🏠</div>
          <div class="empty-state-title">Welcome to MyDash</div>
          <div class="empty-state-sub">Add your self-hosted services, websites, and tools</div>
          <button class="btn-add" onclick="openModal()" style="margin:0 auto;">+ Add your first app</button>
        </div>`;
      return;
    }

    if (filter && list.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🔍</div>
          <div class="empty-state-title">No results for "${esc(filter)}"</div>
        </div>`;
      return;
    }

    // Group by category
    const groups = {};
    list.forEach(a => {
      const cat = a.category || 'Apps';
      (groups[cat] = groups[cat] || []).push(a);
    });

    let html = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
        <span style="font-size:22px;font-weight:700;">My Apps</span>
        ${!filter ? `<button class="btn-add" onclick="openModal()">+ Add App</button>` : ''}
      </div>`;

    for (const [cat, items] of Object.entries(groups)) {
      html += `
        <div class="section">
          <div class="section-header">
            <span class="section-title">${esc(cat)}</span>
          </div>
          <div class="app-grid">
            ${items.map(a => cardHtml(a)).join('')}
            ${!filter ? `<div class="add-card" onclick="openModal()"><div class="add-card-plus">+</div><span>Add App</span></div>` : ''}
          </div>
        </div>`;
    }

    el.innerHTML = html;
    updateCatList();
  }

  function cardHtml(a) {
    const c = THEME_COLORS[a.color ?? 0];
    const isImgIcon = a.icon && (a.icon.startsWith('http') || a.icon.startsWith('/') || a.icon.startsWith('data:'));
    const iconInner = isImgIcon
      ? `<img src="${esc(a.icon)}" onerror="this.parentElement.textContent='🌐'" alt="">`
      : (a.icon || '🌐');
    const shortUrl = (a.url || '').replace(/^https?:\/\//,'').replace(/\/$/,'').slice(0,30);
    return `
      <a class="app-card" href="${esc(a.url||'#')}" target="_blank" rel="noopener noreferrer"
         style="--card-border:${c.border};--card-icon-bg:${c.icon};--card-glow:${c.glow};"
         onclick="cardClick(event,'${a.id}')">
        <div class="card-actions">
          <button class="card-btn card-btn-edit"   onclick="editApp('${a.id}',event)" title="Edit">✏</button>
          <button class="card-btn card-btn-delete" onclick="deleteApp('${a.id}',event)" title="Remove">✕</button>
        </div>
        <div class="app-icon">${iconInner}</div>
        <div class="app-name">${esc(a.name)}</div>
        <div class="app-url">${esc(shortUrl)}</div>
      </a>`;
  }

  function cardClick(e, id) {
    if (e.target.closest('.card-actions')) { e.preventDefault(); e.stopPropagation(); }
  }

  // ── Modal ─────────────────────────────────────────
  function openModal() {
    editId = null;
    selectedColor = prefs.color || 0;
    document.getElementById('modalTitle').textContent = 'Add App';
    document.getElementById('fName').value = '';
    document.getElementById('fUrl').value = '';
    document.getElementById('fIcon').value = '';
    document.getElementById('fCategory').value = '';
    document.getElementById('iconPreview').innerHTML = '🌐';
    renderSwatches();
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fName').focus(), 150);
  }

  function editApp(id, e) {
    e.preventDefault(); e.stopPropagation();
    const a = apps.find(x => x.id === id);
    if (!a) return;
    editId = id;
    selectedColor = a.color ?? 0;
    document.getElementById('modalTitle').textContent = 'Edit App';
    document.getElementById('fName').value = a.name;
    document.getElementById('fUrl').value = a.url || '';
    document.getElementById('fIcon').value = a.icon || '';
    document.getElementById('fCategory').value = a.category || '';
    updatePreview();
    renderSwatches();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
  function overlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

  // ── Icon helpers ──────────────────────────────────
  function onUrlInput() {
    const url = document.getElementById('fUrl').value.trim();
    const name = document.getElementById('fName').value.trim();
    if (!name && url) {
      try {
        const h = new URL(url).hostname.replace(/^www\./,'').split('.')[0];
        document.getElementById('fName').value = h.charAt(0).toUpperCase() + h.slice(1);
      } catch(_) {}
    }
  }

  function autoIcon() {
    const url = document.getElementById('fUrl').value.trim();
    if (!url) { toast('Enter a URL first', 'error'); return; }
    try {
      const domain = new URL(url).hostname;
      const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
      document.getElementById('fIcon').value = faviconUrl;
      updatePreview();
      toast('Icon fetched!', 'success');
    } catch(_) { toast('Invalid URL', 'error'); }
  }

  function updatePreview() {
    const v = document.getElementById('fIcon').value.trim();
    const el = document.getElementById('iconPreview');
    if (!v) { el.innerHTML = '🌐'; return; }
    if (v.startsWith('http') || v.startsWith('/') || v.startsWith('data:')) {
      el.innerHTML = `<img src="${esc(v)}" style="width:36px;height:36px;object-fit:contain;" onerror="this.parentElement.textContent='❌'">`;
    } else {
      el.textContent = v;
    }
  }

  // ── Save / Delete ─────────────────────────────────
  function saveApp() {
    const name = document.getElementById('fName').value.trim();
    const url  = document.getElementById('fUrl').value.trim();
    const icon = document.getElementById('fIcon').value.trim();
    const cat  = document.getElementById('fCategory').value.trim();
    if (!name) { toast('Name is required', 'error'); document.getElementById('fName').focus(); return; }

    if (editId) {
      const idx = apps.findIndex(a => a.id === editId);
      if (idx >= 0) apps[idx] = { ...apps[idx], name, url, icon, category: cat, color: selectedColor };
      toast('App updated', 'success');
    } else {
      apps.push({ id: uid(), name, url, icon, category: cat, color: selectedColor, added: Date.now() });
      toast('App added!', 'success');
    }

    prefs.color = selectedColor;
    saveAll();
    closeModal();
    render();
  }

  function deleteApp(id, e) {
    e.preventDefault(); e.stopPropagation();
    if (!confirm('Remove this app from your dashboard?')) return;
    apps = apps.filter(a => a.id !== id);
    saveAll();
    render();
    toast('Removed', 'info');
  }

  function clearAll() {
    if (!confirm('Delete ALL apps? This cannot be undone.')) return;
    apps = [];
    saveAll();
    render();
    toggleSettings();
    toast('All apps cleared', 'info');
  }

  // ── Search ────────────────────────────────────────
  function filterApps(q) { render(q.trim()); }

  // ── Category datalist ─────────────────────────────
  function updateCatList() {
    const cats = [...new Set(apps.map(a => a.category).filter(Boolean))];
    const dl = document.getElementById('catList');
    if (dl) dl.innerHTML = cats.map(c => `<option value="${esc(c)}">`).join('');
  }

  // ── Settings panel ────────────────────────────────
  function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }

  // ── Persist ───────────────────────────────────────
  function saveAll() {
    localStorage.setItem('mydash-apps', JSON.stringify(apps));
    savePrefs();
  }
  function savePrefs() { localStorage.setItem('mydash-prefs', JSON.stringify(prefs)); }

  // ── Toast ─────────────────────────────────────────
  let toastTimer;
  function toast(msg, type = 'info') {
    clearTimeout(toastTimer);
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  // ── Util ──────────────────────────────────────────
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Keyboard ──────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); document.getElementById('settingsPanel').classList.remove('open'); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openModal(); }
  });

  init();
</script>
</body>
</html>
