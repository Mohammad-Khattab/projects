<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XO Game</title>
    <script>
      // Restore saved data from other PC
      (function() {
        var data = {
          "xo_v2": "[{\"id\":\"mmxy33b84n8fi8\",\"p1\":\"shahd\",\"p2\":\"mo\",\"sc\":{\"p1\":1,\"p2\":0,\"d\":0},\"createdAt\":1773953456516,\"lastPlayed\":1773953471264,\"mode\":\"multiplayer\",\"difficulty\":null}]",
          "xo_v2_theme": "{\"x\":\"#00c864\",\"o\":\"#ffc800\"}"
        };
        for (var key in data) {
          if (!localStorage.getItem(key)) localStorage.setItem(key, data[key]);
        }
      })();
    </script>
    <style>
        :root {
            --bg:        #080810;
            --bg-card:   #0f0f1a;
            --bg-cell:   #131325;
            --border:    #1e1e35;
            --text:      #c8c8e0;
            --muted:     #55556a;
            --x-color:   #328cff;
            --x-glow:    rgba(50,140,255,0.4);
            --o-color:   #ff3fa0;
            --o-glow:    rgba(255,63,160,0.4);
            --win-color: #00c864;
            --win-glow:  rgba(0,200,100,0.4);
            --amber:     #ffc800;
            --red:       #ff5050;
            --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(50,140,255,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,63,160,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Screens ─────────────────────────────────────────── */
        .screen {
            display: none;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 24px;
            flex-direction: column;
            align-items: center;
            animation: fadeUp 0.3s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Logo ────────────────────────────────────────────── */
        .logo {
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            user-select: none;
        }
        .logo .x { color: var(--x-color); text-shadow: 0 0 24px var(--x-glow); }
        .logo .o { color: var(--o-color); text-shadow: 0 0 24px var(--o-glow); }
        .logo .sep { color: var(--muted); font-weight: 300; }
        .logo-big { font-size: 56px; margin-bottom: 6px; }
        .logo-sm  { font-size: 34px; margin-bottom: 4px; }
        .subtitle { color: var(--muted); font-size: 13px; }

        /* ── Buttons ─────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 12px 22px;
            border-radius: 8px;
            border: none;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .btn-blue  { background: var(--x-color); color: #fff; }
        .btn-blue:not(:disabled):hover  { background: #4a9eff; box-shadow: 0 0 22px rgba(50,140,255,0.45); transform: translateY(-1px); }
        .btn-pink  { background: var(--o-color); color: #fff; }
        .btn-pink:not(:disabled):hover  { background: #ff55b4; box-shadow: 0 0 22px rgba(255,63,160,0.45); transform: translateY(-1px); }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--muted); background: rgba(255,255,255,0.03); }
        .btn-red   { background: transparent; color: var(--red); border: 1px solid rgba(255,80,80,0.25); }
        .btn-red:hover { background: rgba(255,80,80,0.1); border-color: var(--red); }
        .btn-full  { width: 100%; }
        .btn-sm    { padding: 9px 18px; font-size: 13px; }

        /* ── Card ────────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            width: 100%;
        }

        /* ── Inputs ──────────────────────────────────────────── */
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .field-label.blue { color: var(--x-color); }
        .field-label.pink { color: var(--o-color); }
        .input {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            font-family: var(--font);
            font-size: 15px;
            color: var(--text);
            outline: none;
            width: 100%;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .input::placeholder { color: var(--muted); }
        .input.blue:focus { border-color: var(--x-color); box-shadow: 0 0 0 3px rgba(50,140,255,0.12); }
        .input.pink:focus { border-color: var(--o-color); box-shadow: 0 0 0 3px rgba(255,63,160,0.12); }
        .err { font-size: 12px; color: var(--red); display: none; }

        /* ── Difficulty pills ────────────────────────────────── */
        .diff-pills { display: flex; gap: 8px; width: 100%; }
        .diff-pill {
            flex: 1;
            padding: 10px 0;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            background: transparent;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .diff-pill:hover { border-color: var(--muted); color: var(--text); }
        .diff-pill.active.easy   { border-color: var(--win-color); color: var(--win-color); background: rgba(0,200,100,0.08); }
        .diff-pill.active.medium { border-color: var(--amber);     color: var(--amber);     background: rgba(255,200,0,0.08); }
        .diff-pill.active.hard   { border-color: var(--red);       color: var(--red);       background: rgba(255,80,80,0.08); }

        /* ── Sessions list ───────────────────────────────────── */
        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
            width: 100%;
            margin-bottom: 8px;
        }
        .sessions { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .sess-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .sess-item:hover { border-color: rgba(50,140,255,0.4); background: rgba(50,140,255,0.04); }
        .sess-main { flex: 1; min-width: 0; }
        .sess-names { display: flex; align-items: center; gap: 7px; font-size: 15px; font-weight: 700; }
        .sess-names .n1 { color: var(--x-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
        .sess-names .n2 { color: var(--o-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
        .sess-names .vs { color: var(--muted); font-weight: 400; font-size: 12px; flex-shrink: 0; }
        .sess-score { display: flex; align-items: center; gap: 5px; font-size: 13px; margin-top: 3px; }
        .sess-score .s1 { color: var(--x-color); font-weight: 700; }
        .sess-score .s2 { color: var(--o-color); font-weight: 700; }
        .sess-score .sd { color: var(--muted); }
        .sess-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .mode-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 6px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .sess-del {
            flex-shrink: 0;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: color 0.15s, background 0.15s;
        }
        .sess-del:hover { color: var(--red); background: rgba(255,80,80,0.1); }
        .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 20px 0; line-height: 1.7; }

        .divider { display: flex; align-items: center; gap: 12px; width: 100%; }
        .divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
        .divider span { font-size: 12px; color: var(--muted); }

        /* ── Scoreboard ──────────────────────────────────────── */
        .scoreboard-wrap { position: relative; width: 100%; }
        .scoreboard {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            width: 100%;
        }
        .ps { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 90px; }
        .ps .sym  { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .ps .pname { font-size: 13px; font-weight: 700; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ps .pname.blue { color: var(--x-color); }
        .ps .pname.pink { color: var(--o-color); }
        .ps .pnum  { font-size: 38px; font-weight: 900; line-height: 1; }
        .ps .pnum.blue { color: var(--x-color); text-shadow: 0 0 18px var(--x-glow); }
        .ps .pnum.pink { color: var(--o-color); text-shadow: 0 0 18px var(--o-glow); }
        .ps-mid { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .ps-mid .dl { font-size: 11px; color: var(--muted); }
        .ps-mid .dn { font-size: 22px; font-weight: 800; color: var(--amber); line-height: 1; }

        /* Active player underline */
        .ps.active { position: relative; }
        .ps.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 2.5px;
            border-radius: 2px;
        }
        .ps.active.blue::after { background: var(--x-color); box-shadow: 0 0 10px var(--x-glow); }
        .ps.active.pink::after { background: var(--o-color); box-shadow: 0 0 10px var(--o-glow); }

        /* Home button on scoreboard */
        .home-btn {
            position: absolute;
            top: 8px; right: 8px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
        }
        .home-btn:hover { border-color: var(--muted); color: var(--text); background: rgba(255,255,255,0.03); }

        /* ── Turn indicator ──────────────────────────────────── */
        .turn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 0 2px;
            transition: color 0.2s;
        }
        .turn.blue { color: var(--x-color); }
        .turn.pink { color: var(--o-color); }
        .turn-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }
        .turn.blue .turn-dot { background: var(--x-color); box-shadow: 0 0 8px var(--x-glow); }
        .turn.pink .turn-dot { background: var(--o-color); box-shadow: 0 0 8px var(--o-glow); }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(1.5); }
        }

        /* ── Board ───────────────────────────────────────────── */
        .board-wrap { position: relative; width: 100%; max-width: 360px; margin: 14px 0; }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .cell {
            aspect-ratio: 1;
            background: var(--bg-cell);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 54px;
            font-weight: 900;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            user-select: none;
        }
        .cell:hover:not(.taken):not(.locked) {
            border-color: var(--muted);
            background: rgba(255,255,255,0.04);
        }
        .cell.taken, .cell.locked { cursor: default; }

        .cell.cx {
            color: var(--x-color);
            border-color: rgba(50,140,255,0.4);
            background: rgba(50,140,255,0.07);
            text-shadow: 0 0 22px var(--x-glow);
            animation: pop 0.22s cubic-bezier(0.175,0.885,0.32,1.3);
        }
        .cell.co {
            color: var(--o-color);
            border-color: rgba(255,63,160,0.4);
            background: rgba(255,63,160,0.07);
            text-shadow: 0 0 22px var(--o-glow);
            animation: pop 0.22s cubic-bezier(0.175,0.885,0.32,1.3);
        }
        .cell.win {
            border-color: var(--win-color) !important;
            background: rgba(0,200,100,0.1) !important;
            text-shadow: 0 0 28px var(--win-glow) !important;
            animation: winpop 0.55s ease forwards !important;
        }
        @keyframes pop {
            0%   { transform: scale(0.45); opacity: 0; }
            100% { transform: scale(1);    opacity: 1; }
        }
        @keyframes winpop {
            0%   { transform: scale(1); }
            30%  { transform: scale(1.1); }
            60%  { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        /* ── Result overlay ──────────────────────────────────── */
        .result-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(8,8,16,0.88);
            border-radius: 14px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 10;
            backdrop-filter: blur(5px);
            animation: fadeUp 0.25s ease;
        }
        .result-overlay.show { display: flex; }
        .result-title { font-size: 26px; font-weight: 900; }
        .result-sub   { font-size: 13px; color: var(--muted); }
        .result-btns  { display: flex; gap: 10px; margin-top: 4px; }

        /* ── Game action bar ─────────────────────────────────── */
        .game-actions { display: flex; gap: 10px; width: 100%; margin-top: 6px; }

        /* ── Modal ───────────────────────────────────────────── */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .modal-bg.show { display: flex; }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            max-width: 320px;
            width: 100%;
            text-align: center;
            animation: fadeUp 0.2s ease;
        }
        .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .modal p  { font-size: 14px; color: var(--muted); margin-bottom: 22px; line-height: 1.55; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }

        /* ── Theme modal ─────────────────────────────────────── */
        .theme-modal {
            max-width: 360px;
            text-align: left;
        }
        .theme-modal h3 { text-align: center; margin-bottom: 4px; }
        .theme-modal .tm-sub { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 20px; }
        .theme-row { margin-bottom: 18px; }
        .theme-row-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 10px;
        }
        .theme-row-label.blue { color: var(--x-color); }
        .theme-row-label.pink { color: var(--o-color); }
        .swatches { display: flex; gap: 10px; flex-wrap: wrap; }
        .swatch {
            width: 34px; height: 34px;
            border-radius: 50%;
            cursor: pointer;
            border: 2.5px solid transparent;
            transition: transform 0.15s, border-color 0.15s;
            flex-shrink: 0;
        }
        .swatch:hover { transform: scale(1.15); }
        .swatch.active { border-color: #fff; box-shadow: 0 0 0 1px rgba(255,255,255,0.3); }
        .theme-close { width: 100%; margin-top: 4px; }

        /* ── Boot overlay (matches Lambda Land style) ───────── */
        #bootOverlay {
            position: fixed; inset: 0;
            background: var(--bg);
            z-index: 999999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            user-select: none;
            transition: opacity 0.7s ease, visibility 0.7s ease;
        }
        #bootOverlay.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        #bootOverlay::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
            pointer-events: none;
        }
        .boot-ring-wrap { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
        .boot-pulse {
            position: absolute; inset: 0; border-radius: 50%;
            border: 1px solid rgba(50,140,255,0.5);
            animation: bootPulse 2s ease-out infinite;
        }
        .boot-pulse:nth-child(2) { animation-delay: 0.65s; }
        .boot-pulse:nth-child(3) { animation-delay: 1.3s; }
        .boot-spinner {
            position: absolute; inset: 12px; border-radius: 50%;
            border: 2px solid rgba(50,140,255,0.15);
            border-top-color: var(--x-color);
            border-right-color: rgba(50,140,255,0.5);
            animation: bootSpin 0.85s linear infinite;
            box-shadow: 0 0 18px rgba(50,140,255,0.4);
        }
        .boot-spinner-2 {
            position: absolute; inset: 22px; border-radius: 50%;
            border: 1px solid rgba(50,140,255,0.1);
            border-bottom-color: rgba(50,140,255,0.6);
            animation: bootSpin 1.4s linear infinite reverse;
        }
        .boot-dot {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--x-color);
            animation: bootDotPulse 1s ease-in-out infinite alternate;
        }
        .boot-title {
            font-size: 13px; font-weight: 600; letter-spacing: 0.12em;
            text-transform: uppercase; color: #fff;
        }
        .boot-title .bx { color: var(--x-color); text-shadow: 0 0 12px var(--x-glow); }
        .boot-title .bo { color: var(--o-color); text-shadow: 0 0 12px var(--o-glow); }
        .boot-status {
            font-family: var(--font-mono, monospace);
            font-size: 11px; color: var(--muted);
            letter-spacing: 0.08em; min-height: 16px;
        }
        .boot-bar-wrap { width: 180px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .boot-bar {
            height: 100%; width: 0%;
            background: var(--x-color);
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(50,140,255,0.7);
            transition: width 0.1s linear;
        }
        @keyframes bootPulse { 0%{transform:scale(1);opacity:0.7} 100%{transform:scale(2.4);opacity:0} }
        @keyframes bootSpin  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes bootDotPulse {
            from { box-shadow: 0 0 8px rgba(50,140,255,0.7), 0 0 20px rgba(50,140,255,0.3); transform: translate(-50%,-50%) scale(1); }
            to   { box-shadow: 0 0 20px rgba(50,140,255,1), 0 0 40px rgba(50,140,255,0.5); transform: translate(-50%,-50%) scale(1.15); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Responsive ──────────────────────────────────────── */
        @media (max-width: 420px) {
            .screen { padding: 14px; }
            .cell { font-size: 40px; border-radius: 8px; }
            .board { gap: 7px; }
            .ps .pnum { font-size: 30px; }
        }
    </style>
</head>
<body>

<!-- ═══ HOME SCREEN ═══════════════════════════════════════════════ -->
<div id="s-home" class="screen active">
    <div class="logo logo-big"><span class="x">X</span><span class="sep"> / </span><span class="o">O</span></div>
    <p class="subtitle" style="margin-bottom:28px">Tic-Tac-Toe</p>

    <div style="display:flex;flex-direction:column;gap:10px;width:100%;margin-bottom:16px">
        <button class="btn btn-blue btn-full" onclick="goSolo()">Single Player</button>
        <button class="btn btn-pink btn-full" onclick="goNewGame()">Multiplayer</button>
        <button class="btn btn-ghost btn-full" onclick="openTheme()">Theme</button>
    </div>

    <div id="sessions-wrap" style="width:100%;display:none;margin-top:8px">
        <div class="divider" style="margin-bottom:16px"><hr><span>saved sessions</span><hr></div>
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:8px">
            <div class="section-label" style="margin-bottom:0">Recent Sessions</div>
            <button class="btn btn-red btn-sm" style="padding:4px 10px;font-size:11px" onclick="delAllSessions()">Delete All</button>
        </div>
        <div class="sessions" id="sessions-list"></div>
    </div>

    <div id="home-empty" class="empty" style="display:none;margin-top:12px">

<script>
// ── State ──────────────────────────────────────────────────────────
let sessions    = [];
let active      = null;
let cells       = Array(9).fill(null);
let turn        = 1;
let over        = false;
let mode        = 'multiplayer'; // 'multiplayer' | 'singleplayer'
let difficulty  = 'easy';        // 'easy' | 'medium' | 'hard'
const AI_PLAYER = 2;
const LINES     = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

// ── Persistence ────────────────────────────────────────────────────
function persist() {
    localStorage.setItem('xo_v2', JSON.stringify(sessions));
    console.log('[persist] saved', sessions.length, 'session(s)');
}
function hydrate() {
    try {
        sessions = JSON.parse(localStorage.getItem('xo_v2')) || [];
        console.log('[hydrate] loaded', sessions.length, 'session(s)');
    } catch(e) {
        console.warn('[hydrate] failed:', e);
        sessions = [];
    }
}

// ── Game state save/restore ─────────────────────────────────────────
function saveGameState() {
    if (!active) return;
    const state = { sessionId: active.id, cells, turn, over, mode, difficulty };
    localStorage.setItem('xo_v2_state', JSON.stringify(state));
    console.log('[state] saved — session:', active.id, 'turn:', turn, 'over:', over, 'mode:', mode);
}
function clearGameState() {
    localStorage.removeItem('xo_v2_state');
    console.log('[state] cleared');
}
function restoreGameState() {
    try {
        const raw = localStorage.getItem('xo_v2_state');
        if (!raw) return false;
        const state = JSON.parse(raw);
        const sess  = sessions.find(s => s.id === state.sessionId);
        if (!sess) { console.warn('[state] session gone'); clearGameState(); return false; }
        active     = sess;
        cells      = state.cells;
        turn       = state.turn;
        over       = state.over;
        mode       = state.mode || 'multiplayer';
        difficulty = state.difficulty || 'easy';
        console.log('[state] restored — session:', active.id, 'mode:', mode, 'diff:', difficulty);
        return true;
    } catch(e) {
        console.warn('[state] restore failed:', e);
        clearGameState();
        return false;
    }
}

function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

// ── Relative time ──────────────────────────────────────────────────
function ago(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s <  60) return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
}

// ── Screen navigation ──────────────────────────────────────────────
function show(id) {
    console.log('[nav] screen:', id);
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function goHome() {
    console.log('[nav] going home');
    stopFireworks();
    window.cursorFxSetColor(null);
    document.getElementById('result-overlay').classList.remove('show', 'is-win');
    renderSessions();
    show('s-home');
}

function goNewGame() {
    console.log('[nav] going to multiplayer setup');
    document.getElementById('inp-p1').value = '';
    document.getElementById('inp-p2').value = '';
    document.getElementById('new-err').style.display = 'none';
    document.getElementById('btn-start').disabled = true;
    show('s-new');
    setTimeout(() => document.getElementById('inp-p1').focus(), 80);
}

function goSolo() {
    console.log('[nav] going to solo setup');
    document.getElementById('inp-solo').value = '';
    document.getElementById('solo-err').style.display = 'none';
    document.getElementById('btn-solo-start').disabled = true;
    // Reset difficulty pills to current selection
    document.querySelectorAll('.diff-pill').forEach(p => {
        p.classList.toggle('active', p.classList.contains(difficulty));
    });
    show('s-solo');
    setTimeout(() => document.getElementById('inp-solo').focus(), 80);
}

// ── Difficulty pills ───────────────────────────────────────────────
function setDiff(d, btn) {
    difficulty = d;
    document.querySelectorAll('.diff-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    console.log('[solo] difficulty set to:', difficulty);
}

// ── Sessions ───────────────────────────────────────────────────────
function renderSessions() {
    const multi  = sessions.filter(s => s.mode !== 'singleplayer');
    console.log('[sessions] rendering', multi.length, 'multiplayer session(s)');
    const wrap  = document.getElementById('sessions-wrap');
    const list  = document.getElementById('sessions-list');
    const empty = document.getElementById('home-empty');
    list.innerHTML = '';

    if (multi.length === 0) {
        wrap.style.display  = 'none';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';
    wrap.style.display  = 'block';

    const sorted = [...multi].sort((a, b) => b.lastPlayed - a.lastPlayed);
    sorted.forEach(s => {
        const el = document.createElement('div');
        el.className = 'sess-item';
        el.innerHTML = `
            <div class="sess-main" onclick="resumeSession('${s.id}')">
                <div class="sess-names">
                    <span class="n1">${esc(s.p1)}</span>
                    <span class="vs">vs</span>
                    <span class="n2">${esc(s.p2)}</span>
                </div>
                <div class="sess-score">
                    <span class="s1">${s.sc.p1}</span>
                    <span class="sd">—</span>
                    <span class="s2">${s.sc.p2}</span>
                    <span class="sd" style="margin-left:5px">(${s.sc.d} draws)</span>
                </div>
                <div class="sess-time">${ago(s.lastPlayed)}</div>
            </div>
            <button class="sess-del" onclick="delSession(event,'${s.id}')" title="Delete">×</button>
        `;
        list.appendChild(el);
    });
}

function delAllSessions() {
    sessions = sessions.filter(s => s.mode === 'singleplayer'); // keep solo in memory (not displayed anyway)
    persist();
    console.log('[sessions] deleted all multiplayer sessions');
    renderSessions();
}

function delSession(e, id) {
    e.stopPropagation();
    console.log('[sessions] deleting:', id);
    sessions = sessions.filter(s => s.id !== id);
    persist();
    renderSessions();
}

function resumeSession(id) {
    active = sessions.find(s => s.id === id);
    if (!active) { console.warn('[sessions] not found:', id); return; }
    mode       = active.mode || 'multiplayer';
    difficulty = active.difficulty || 'easy';
    console.log('[sessions] resuming:', id, mode, difficulty);
    launchGame();
}

// ── Solo session ───────────────────────────────────────────────────
function validateSolo() {
    const name = document.getElementById('inp-solo').value.trim();
    document.getElementById('btn-solo-start').disabled = !name;
}

function startSolo() {
    const name = document.getElementById('inp-solo').value.trim();
    if (!name) return;
    mode = 'singleplayer';
    active = {
        id: genId(), p1: name, p2: 'Bot',
        sc: { p1: 0, p2: 0, d: 0 },
        createdAt: Date.now(), lastPlayed: Date.now(),
        mode: 'singleplayer', difficulty
    };
    console.log('[solo] created session (not saved):', active.id, 'diff:', difficulty);
    // Solo sessions are not saved to the sessions list
    launchGame();
}

// ── Multiplayer session ────────────────────────────────────────────
function validateNew() {
    const p1  = document.getElementById('inp-p1').value.trim();
    const p2  = document.getElementById('inp-p2').value.trim();
    const err = document.getElementById('new-err');
    const btn = document.getElementById('btn-start');

    if (!p1 || !p2) { btn.disabled = true; err.style.display = 'none'; return; }
    if (p1.toLowerCase() === p2.toLowerCase()) {
        showErr('Players must have different names.'); btn.disabled = true; return;
    }
    const dup = sessions.find(s =>
        s.mode !== 'singleplayer' &&
        ((s.p1.toLowerCase() === p1.toLowerCase() && s.p2.toLowerCase() === p2.toLowerCase()) ||
         (s.p1.toLowerCase() === p2.toLowerCase() && s.p2.toLowerCase() === p1.toLowerCase()))
    );
    if (dup) {
        showErr('A session for these players already exists — resume it from the home screen.');
        btn.disabled = true; return;
    }
    err.style.display = 'none';
    btn.disabled = false;

    function showErr(msg) { err.textContent = msg; err.style.display = 'block'; }
}

function createSession() {
    const p1 = document.getElementById('inp-p1').value.trim();
    const p2 = document.getElementById('inp-p2').value.trim();
    mode = 'multiplayer';
    active = { id: genId(), p1, p2, sc: { p1: 0, p2: 0, d: 0 }, createdAt: Date.now(), lastPlayed: Date.now(), mode: 'multiplayer', difficulty: null };
    console.log('[session] created multiplayer:', active.id, p1, 'vs', p2);
    sessions.push(active);
    persist();
    launchGame();
}

// ── Game ───────────────────────────────────────────────────────────
function launchGame() {
    cells = Array(9).fill(null);
    over  = false;
    // In solo, if bot goes first, trigger AI immediately after board is built
    turn = Math.random() < 0.5 ? 1 : 2;

    const firstName = turn === 1 ? active.p1 : active.p2;
    console.log('[game] launched | mode:', mode, '| first:', firstName);

    document.getElementById('g-n1').textContent = active.p1;
    document.getElementById('g-n2').textContent = active.p2;
    refreshScores();
    buildBoard();
    refreshTurn();
    hideResult();
    show('s-game');

    // If solo and bot goes first
    if (mode === 'singleplayer' && turn === AI_PLAYER) {
        console.log('[ai] bot goes first');
        setTimeout(doAiMove, 600);
    }
}

function buildBoard() {
    console.log('[board] building');
    const b = document.getElementById('board');
    b.innerHTML = '';
    for (let i = 0; i < 9; i++) {
        const c = document.createElement('div');
        c.className = 'cell';
        c.dataset.i = i;
        c.addEventListener('click', onCell);
        b.appendChild(c);
    }
}

function onCell(e) {
    if (over) { console.log('[cell] ignored — game over'); return; }
    if (mode === 'singleplayer' && turn === AI_PLAYER) { console.log('[cell] ignored — bot turn'); return; }
    const i = +e.currentTarget.dataset.i;
    if (cells[i] !== null) { console.log('[cell] ignored — taken'); return; }
    placeMove(i, turn);
}

function placeMove(i, player) {
    cells[i] = player;
    const cellEl = document.getElementById('board').children[i];
    cellEl.textContent = player === 1 ? 'X' : 'O';
    cellEl.classList.add(player === 1 ? 'cx' : 'co', 'taken');
    console.log('[move]', player === 1 ? active.p1 : active.p2, 'played cell', i, '|', cells.map(v=>v===1?'X':v===2?'O':'.').join(' '));
    saveGameState();

    const win = checkWin();
    if (win) {
        win.line.forEach(idx => document.getElementById('board').children[idx].classList.add('win'));
        lockAll();
        over = true;
        const winner = player === 1 ? active.p1 : active.p2;
        const col    = player === 1 ? 'var(--x-color)' : 'var(--o-color)';
        if (player === 1) active.sc.p1++; else active.sc.p2++;
        active.lastPlayed = Date.now();
        console.log('[game] winner:', winner, 'via', win.line);
        persist(); saveGameState(); refreshScores();
        showResult(winner + ' wins!', 'Well played.', col, true);
        return;
    }
    if (cells.every(v => v !== null) || checkInevitableDraw()) {
        lockAll();
        over = true;
        active.sc.d++;
        active.lastPlayed = Date.now();
        const drawSub = cells.every(v => v !== null) ? 'No winner this round.' : 'No possible winner — board is blocked.';
        console.log('[game] draw —', drawSub);
        persist(); saveGameState(); refreshScores();
        showResult('Draw!', drawSub, 'var(--amber)');
        return;
    }

    turn = turn === 1 ? 2 : 1;
    refreshTurn();
    console.log('[game] turn ->', turn === 1 ? active.p1 : active.p2);

    if (mode === 'singleplayer' && turn === AI_PLAYER && !over) {
        setTimeout(doAiMove, 420);
    }
}

// ── AI ─────────────────────────────────────────────────────────────
function doAiMove() {
    if (over) return;
    let idx;
    if (difficulty === 'easy')   idx = aiEasy();
    else if (difficulty === 'medium') idx = aiMedium();
    else                         idx = aiHard();
    console.log('[ai]', difficulty, '→ cell', idx);
    placeMove(idx, AI_PLAYER);
}

function aiEasy() {
    const empty = cells.map((v,i) => v === null ? i : -1).filter(i => i >= 0);
    return empty[Math.random() * empty.length | 0];
}

function aiMedium() {
    // Win if possible
    const win = findWinning(AI_PLAYER);
    if (win !== -1) return win;
    // Block human win
    const block = findWinning(1);
    if (block !== -1) return block;
    // Otherwise random
    return aiEasy();
}

function findWinning(player) {
    for (const line of LINES) {
        const vals = line.map(i => cells[i]);
        const mine = vals.filter(v => v === player).length;
        const empty = line.filter(i => cells[i] === null);
        if (mine === 2 && empty.length === 1) return empty[0];
    }
    return -1;
}

function aiHard() {
    let bestScore = -Infinity, bestIdx = -1;
    for (let i = 0; i < 9; i++) {
        if (cells[i] !== null) continue;
        cells[i] = AI_PLAYER;
        const score = minimax(cells.slice(), 0, false);
        cells[i] = null;
        if (score > bestScore) { bestScore = score; bestIdx = i; }
    }
    return bestIdx;
}

function minimax(c, depth, isMax) {
    const w = winnerOf(c);
    if (w === AI_PLAYER) return 10 - depth;
    if (w === 1)         return depth - 10;
    if (c.every(v => v !== null)) return 0;

    if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
            if (c[i] !== null) continue;
            c[i] = AI_PLAYER;
            best = Math.max(best, minimax(c, depth + 1, false));
            c[i] = null;
        }
        return best;
    } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
            if (c[i] !== null) continue;
            c[i] = 1;
            best = Math.min(best, minimax(c, depth + 1, true));
            c[i] = null;
        }
        return best;
    }
}

function winnerOf(c) {
    for (const [a, b, d] of LINES) {
        if (c[a] && c[a] === c[b] && c[a] === c[d]) return c[a];
    }
    return null;
}

// ── Win / draw checks ──────────────────────────────────────────────
function checkWin() {
    for (const line of LINES) {
        const [a, b, c] = line;
        if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c])
            return { player: cells[a], line };
    }
    return null;
}

function checkInevitableDraw() {
    const blocked = LINES.every(line => {
        const vals = line.map(i => cells[i]);
        return vals.includes(1) && vals.includes(2);
    });
    if (blocked) console.log('[game] inevitable draw detected');
    return blocked;
}

function lockAll() {
    console.log('[board] locked');
    document.getElementById('board').querySelectorAll('.cell').forEach(c => c.classList.add('locked'));
}

// ── UI updates ─────────────────────────────────────────────────────
function refreshTurn() {
    const el   = document.getElementById('turn');
    const txt  = document.getElementById('turn-txt');
    const p1el = document.getElementById('ps1');
    const p2el = document.getElementById('ps2');
    const name = turn === 1 ? active.p1 : active.p2;
    el.className = 'turn ' + (turn === 1 ? 'blue' : 'pink');
    txt.textContent = name + "'s turn";
    p1el.classList.toggle('active', turn === 1);
    p2el.classList.toggle('active', turn === 2);
}

function refreshScores() {
    document.getElementById('g-s1').textContent = active.sc.p1;
    document.getElementById('g-s2').textContent = active.sc.p2;
    document.getElementById('g-sd').textContent = active.sc.d;
    console.log('[scores]', active.p1 + '=' + active.sc.p1, active.p2 + '=' + active.sc.p2, 'draws=' + active.sc.d);
}

function showResult(title, sub, color, isWin) {
    console.log('[result]', title, '| win:', !!isWin);
    document.getElementById('res-title').textContent = title;
    document.getElementById('res-title').style.color = color;
    document.getElementById('res-sub').textContent   = sub;
    const overlay = document.getElementById('result-overlay');
    overlay.classList.toggle('is-win', !!isWin);
    overlay.classList.add('show');
    if (isWin) { launchFireworks(color); window.cursorFxSetColor(color); }
}
function hideResult() {
    const overlay = document.getElementById('result-overlay');
    overlay.classList.remove('show', 'is-win');
    stopFireworks();
    window.cursorFxSetColor(null);
}

function playAgain() {
    console.log('[game] play again');
    clearGameState();
    cells = Array(9).fill(null);
    over  = false;
    turn  = Math.random() < 0.5 ? 1 : 2;
    buildBoard();
    refreshTurn();
    hideResult();
    if (mode === 'singleplayer' && turn === AI_PLAYER) {
        setTimeout(doAiMove, 600);
    }
}

function endAndHome() {
    console.log('[session] ending:', active.id);
    active.lastPlayed = Date.now();
    persist();
    clearGameState();
    goHome();
}

}

function askEndSession() {

function askNewSession() {

// ── Theme ──────────────────────────────────────────────────────────
const X_SWATCHES = ['#328cff','#ff5050','#00c864','#b06bff','#ff8c32','#ffc800'];
const O_SWATCHES = ['#ff3fa0','#00c8e0','#ff8c32','#ffc800','#ff5050','#b06bff'];
let themeX = '#328cff', themeO = '#ff3fa0';

function hexToRgba(hex, a) {
    const r = hexToRgb(hex);
    return r ? `rgba(${r.r},${r.g},${r.b},${a})` : `rgba(255,255,255,${a})`;
}

function applyTheme(x, o) {
    const root = document.documentElement.style;
    root.setProperty('--x-color', x);
    root.setProperty('--x-glow',  hexToRgba(x, 0.4));
    root.setProperty('--o-color', o);
    root.setProperty('--o-glow',  hexToRgba(o, 0.4));
    themeX = x; themeO = o;
    console.log('[theme] applied x:', x, 'o:', o);
}

function saveTheme() {
    localStorage.setItem('xo_v2_theme', JSON.stringify({ x: themeX, o: themeO }));
}

function loadTheme() {
    try {
        const t = JSON.parse(localStorage.getItem('xo_v2_theme'));
        if (t && t.x && t.o) { applyTheme(t.x, t.o); console.log('[theme] loaded'); }
    } catch(e) { console.warn('[theme] load failed:', e); }
}

function buildSwatches() {
    const xWrap = document.getElementById('x-swatches');
    const oWrap = document.getElementById('o-swatches');
    xWrap.innerHTML = ''; oWrap.innerHTML = '';

    X_SWATCHES.forEach(color => {
        const s = document.createElement('div');
        s.className = 'swatch' + (color === themeX ? ' active' : '');
        s.style.background = color;
        s.title = color;
        s.onclick = () => {
            applyTheme(color, themeO);
            saveTheme();
            xWrap.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
            s.classList.add('active');
        };
        xWrap.appendChild(s);
    });

    O_SWATCHES.forEach(color => {
        const s = document.createElement('div');
        s.className = 'swatch' + (color === themeO ? ' active' : '');
        s.style.background = color;
        s.title = color;
        s.onclick = () => {
            applyTheme(themeX, color);
            saveTheme();
            oWrap.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
            s.classList.add('active');
        };
        oWrap.appendChild(s);
    });
}

function openTheme() {
    console.log('[theme] opening picker');
    buildSwatches();
    document.getElementById('theme-bg').classList.add('show');
}
function closeTheme() {
    document.getElementById('theme-bg').classList.remove('show');
}

// ── Utilities ──────────────────────────────────────────────────────
function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}
function cap(str) { return str.charAt(0).toUpperCase() + str.slice(1); }

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeTheme(); }
    if (e.key === 'Enter') {

});
document.getElementById('modal-bg').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-bg')) closeModal();
});
document.getElementById('theme-bg').addEventListener('click', e => {
    if (e.target === document.getElementById('theme-bg')) closeTheme();
});

// ── Fireworks ──────────────────────────────────────────────────────
let fwRaf      = null;
let fwParticles = [];
let fwTimers   = [];

function hexToRgb(hex) {
    const m = hex.replace('#','').match(/^([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
    return m ? { r: parseInt(m[1],16), g: parseInt(m[2],16), b: parseInt(m[3],16) } : null;
}

function resolveColor(cssVar) {
    if (cssVar.startsWith('var(')) {
        const name = cssVar.slice(4, -1).trim();
        const val  = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        return hexToRgb(val) || { r: 255, g: 200, b: 50 };
    }
    return hexToRgb(cssVar) || { r: 255, g: 200, b: 50 };
}

function fwBurst(canvas, base, x, y) {
    const count = 60 + (Math.random() * 30 | 0);
    for (let i = 0; i < count; i++) {
        const angle  = (Math.PI * 2 * i / count) + Math.random() * 0.25;
        const speed  = 3 + Math.random() * 6;
        const bright = 0.55 + Math.random() * 0.45;
        fwParticles.push({
            x, y, px: x, py: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            r:  1.5 + Math.random() * 3,
            alpha: 1,
            decay:   0.012 + Math.random() * 0.013,
            gravity: 0.07  + Math.random() * 0.07,
            cr: Math.min(255, (base.r * bright + Math.random() * 50)) | 0,
            cg: Math.min(255, (base.g * bright + Math.random() * 50)) | 0,
            cb: Math.min(255, (base.b * bright + Math.random() * 50)) | 0,
        });
    }
}

function launchFireworks(color) {
    console.log('[fireworks] launching:', color);
    stopFireworks();
    const canvas = document.getElementById('fw-canvas');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.display = 'block';
    const ctx  = canvas.getContext('2d');
    const base = resolveColor(color);

    function randX() { return canvas.width  * (0.1 + Math.random() * 0.8); }
    function randY() { return canvas.height * (0.05 + Math.random() * 0.5); }

    const delays = [150, 320, 500, 720, 950, 1150, 1380, 1600, 1850, 2100];
    fwBurst(canvas, base, randX(), randY());
    console.log('[fireworks] first burst, scheduling', delays.length, 'more');
    delays.forEach((d, idx) => {
        fwTimers.push(setTimeout(() => {
            console.log('[fireworks] burst', idx + 2, 'at +' + d + 'ms');
            fwBurst(canvas, base, randX(), randY());
        }, d));
    });

    function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        fwParticles = fwParticles.filter(p => p.alpha > 0.015);
        for (const p of fwParticles) {
            ctx.beginPath();
            ctx.moveTo(p.px, p.py);
            ctx.lineTo(p.x,  p.y);
            ctx.strokeStyle = `rgba(${p.cr},${p.cg},${p.cb},${p.alpha * 0.35})`;
            ctx.lineWidth   = p.r * 0.8;
            ctx.lineCap     = 'round';
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle   = `rgba(${p.cr},${p.cg},${p.cb},${p.alpha})`;
            ctx.shadowColor = `rgba(${p.cr},${p.cg},${p.cb},0.7)`;
            ctx.shadowBlur  = 8;
            ctx.fill();
            ctx.shadowBlur  = 0;

            p.px = p.x; p.py = p.y;
            p.x += p.vx; p.y += p.vy;
            p.vy += p.gravity; p.vx *= 0.97;
            p.alpha -= p.decay; p.r *= 0.993;
        }
        fwRaf = requestAnimationFrame(frame);
    }
    fwRaf = requestAnimationFrame(frame);
    fwTimers.push(setTimeout(stopFireworks, 3500));
}

function stopFireworks() {
    if (fwRaf) { cancelAnimationFrame(fwRaf); fwRaf = null; }
    fwTimers.forEach(clearTimeout);
    fwTimers = []; fwParticles = [];
    const canvas = document.getElementById('fw-canvas');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = 'none';
}

// ── Cursor fireworks ───────────────────────────────────────────────
(function cursorFx() {
    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9997';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');

    let particles = [];
    let raf       = null;
    let lastX = -999, lastY = -999;
    let throttle  = 0;
    let winColor  = null; // {r,g,b} resolved from winner CSS var

    function resolveColor(cssColor) {
        if (!cssColor) return null;
        let hex = cssColor.startsWith('var(')
            ? getComputedStyle(document.documentElement).getPropertyValue(cssColor.slice(4,-1).trim()).trim()
            : cssColor;
        if (hex.startsWith('#') && hex.length === 7) {
            const n = parseInt(hex.slice(1), 16);
            return { r: (n>>16)&255, g: (n>>8)&255, b: n&255 };
        }
        return null;
    }
    window.cursorFxSetColor = c => { winColor = resolveColor(c); };

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function isGameActive() {
        const overlay = document.getElementById('result-overlay');
        return overlay.classList.contains('show') && overlay.classList.contains('is-win');
    }

    function spawnAt(x, y) {
        const count = 6 + (Math.random() * 4 | 0);
        const hue = Math.random() * 360;
        const wc  = winColor;
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.8 + Math.random() * 2.2;
            particles.push({
                x, y, px: x, py: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 0.5,
                r: 1.2 + Math.random() * 2,
                alpha: 0.9,
                decay: 0.015 + Math.random() * 0.012,
                gravity: 0.06,
                // winner color or random HSL
                useWin: !!wc,
                wr: wc ? wc.r : 0, wg: wc ? wc.g : 0, wb: wc ? wc.b : 0,
                hue: (hue + Math.random() * 40 - 20) % 360,
                sat: 80 + Math.random() * 20,
                lit: 55 + Math.random() * 15,
            });
        }
        if (!raf) raf = requestAnimationFrame(frame);
    }

    function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.alpha > 0.02);

        for (const p of particles) {
            const solid = p.useWin
                ? `rgba(${p.wr},${p.wg},${p.wb},${p.alpha})`
                : `hsla(${p.hue},${p.sat}%,${p.lit}%,${p.alpha})`;
            const faint = p.useWin
                ? `rgba(${p.wr},${p.wg},${p.wb},${p.alpha * 0.4})`
                : `hsla(${p.hue},${p.sat}%,${p.lit}%,${p.alpha * 0.4})`;

            // Trail line
            ctx.beginPath();
            ctx.moveTo(p.px, p.py);
            ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = faint;
            ctx.lineWidth = p.r * 0.7;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Dot
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = solid;
            ctx.shadowColor = solid;
            ctx.shadowBlur  = 6;
            ctx.fill();
            ctx.shadowBlur  = 0;

            p.px = p.x; p.py = p.y;
            p.x += p.vx; p.y += p.vy;
            p.vy += p.gravity;
            p.vx *= 0.96;
            p.alpha -= p.decay;
            p.r *= 0.97;
        }

        if (particles.length > 0) {
            raf = requestAnimationFrame(frame);
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            raf = null;
        }
    }

    document.addEventListener('mousemove', e => {
        if (!isGameActive()) return;
        const now = Date.now();
        if (now - throttle < 30) return;   // ~33fps max spawn rate
        const dx = e.clientX - lastX, dy = e.clientY - lastY;
        if (dx * dx + dy * dy < 100) return; // must move 10px to spawn
        throttle = now;
        lastX = e.clientX; lastY = e.clientY;
        spawnAt(e.clientX, e.clientY);
    });
})();

// ── Init ───────────────────────────────────────────────────────────
console.log('[init] XO Game starting up');
hydrate();
loadTheme();

(function initWithBoot() {
    const overlay  = document.getElementById('bootOverlay');
    const statusEl = document.getElementById('bootStatus');
    const barEl    = document.getElementById('bootBar');

    const restored = restoreGameState();
    console.log('[init] restored:', restored, '| sessions:', sessions.length);

    const readyMsg = restored
        ? `Resuming \u2014 ${active.p1} vs ${active.p2}`
        : sessions.length > 0
            ? `${sessions.length} session(s) ready`
            : 'Ready to play';

    const steps = [
        { pct: 15,  msg: 'Loading storage...' },
        { pct: 42,  msg: restored ? 'Restoring your game...' : 'Loading saved sessions...' },
        { pct: 68,  msg: 'Preparing board...' },
        { pct: 88,  msg: 'Checking sessions...' },
        { pct: 100, msg: readyMsg },
    ];

    let i = 0;
    function tick() {
        if (i >= steps.length) {
            setTimeout(() => {
                overlay.classList.add('fade-out');
                overlay.addEventListener('transitionend', () => {
                    overlay.remove();
                    if (restored) {
                        document.getElementById('g-n1').textContent = active.p1;
                        document.getElementById('g-n2').textContent = active.p2;
                        refreshScores();
                        buildBoard();
                        const cellEls = document.getElementById('board').children;
                        for (let i = 0; i < 9; i++) {
                            if (cells[i] === 1) { cellEls[i].textContent = 'X'; cellEls[i].classList.add('cx','taken'); }
                            if (cells[i] === 2) { cellEls[i].textContent = 'O'; cellEls[i].classList.add('co','taken'); }
                        }
                        if (over) {
                            lockAll();
                            const win = checkWin();
                            if (win) win.line.forEach(idx => cellEls[idx].classList.add('win'));
                        }
                        refreshTurn();
                        show('s-game');
                        console.log('[init] restored to game screen');
                    } else {
                        goHome();
                    }
                }, { once: true });
            }, 260);
            return;
        }
        const s = steps[i++];
        barEl.style.width    = s.pct + '%';
        statusEl.textContent = s.msg;
        setTimeout(tick, i === steps.length ? 180 : 120 + Math.random() * 80);
    }
    setTimeout(tick, 320);
})();
</script>
