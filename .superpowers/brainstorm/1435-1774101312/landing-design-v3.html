<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKLL — Red Theme + Expandable</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0005; font-family: system-ui, sans-serif; color: white; overflow: hidden; height: 100vh; }

  #shader-canvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    touch-action: none; z-index: 0;
  }

  /* ── LANDING STATE ─────────────────────────── */
  #landing {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #landing.hidden { opacity: 0; transform: scale(0.96) translateY(-20px); pointer-events: none; }

  .stack-area {
    position: relative; height: 180px; width: 460px; margin-bottom: 32px; flex-shrink: 0;
  }
  .stack-card {
    position: absolute; width: 125px; height: 125px;
    background: rgba(255,255,255,0.07); backdrop-filter: blur(18px);
    border: 1px solid rgba(220,60,60,0.3); border-radius: 22px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .stack-card::before {
    content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,100,100,0.5), transparent);
  }
  .stack-card:nth-child(1) { left: 20px; top: 20px; animation: float1 5s ease-in-out infinite; }
  .stack-card:nth-child(2) { left: 50%; top: 5px; animation: float2 5s ease-in-out infinite; }
  .stack-card:nth-child(3) { right: 20px; top: 20px; animation: float3 5s ease-in-out infinite; }
  @keyframes float1 { 0%,100%{transform:rotate(-13deg) translateY(10px)} 50%{transform:rotate(-13deg) translateY(-4px)} }
  @keyframes float2 { 0%,100%{transform:translateX(-50%) rotate(-2deg) translateY(0)} 50%{transform:translateX(-50%) rotate(-2deg) translateY(-12px)} }
  @keyframes float3 { 0%,100%{transform:rotate(11deg) translateY(10px)} 50%{transform:rotate(11deg) translateY(-4px)} }
  .stack-icon { font-size: 30px; }
  .stack-name { font-size: 10.5px; color: rgba(255,255,255,0.85); font-weight: 500; }

  .hero-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 4px; color: rgba(220,80,80,0.85);
    text-transform: uppercase; margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .hero-eyebrow::before, .hero-eyebrow::after {
    content: ''; display: block; width: 28px; height: 1px; background: rgba(220,80,80,0.45);
  }
  .hero-title {
    font-size: 72px; font-weight: 900; font-family: monospace; letter-spacing: 8px;
    background: linear-gradient(135deg, #ff4444, #cc0000, #ff6666, #990000);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1; margin-bottom: 8px; background-size: 200%;
    animation: gradShift 4s ease infinite alternate;
  }
  @keyframes gradShift { 0%{background-position:0%} 100%{background-position:100%} }
  .hero-sub { font-size: 13px; color: rgba(220,100,100,0.65); letter-spacing: 3px; margin-bottom: 22px; }
  .hero-desc { font-size: 14px; color: rgba(255,255,255,0.45); max-width: 340px; text-align: center; line-height: 1.6; margin-bottom: 32px; }

  .get-started-btn {
    padding: 14px 44px;
    background: linear-gradient(135deg, #cc0000, #ff4444);
    color: white; font-size: 15px; font-weight: 800; letter-spacing: 1px;
    border: none; border-radius: 40px; cursor: pointer;
    box-shadow: 0 8px 32px rgba(200,0,0,0.45), 0 0 0 1px rgba(255,80,80,0.3);
    animation: btnGlow 3s ease-in-out infinite;
    transition: transform 0.2s;
  }
  @keyframes btnGlow {
    0%,100%{box-shadow:0 8px 32px rgba(200,0,0,0.45),0 0 0 1px rgba(255,80,80,0.3)}
    50%{box-shadow:0 8px 48px rgba(200,0,0,0.7),0 0 0 5px rgba(255,80,80,0.1)}
  }
  .get-started-btn:hover { transform: translateY(-3px) scale(1.05); }

  /* ── DASHBOARD STATE ───────────────────────── */
  #dashboard {
    position: fixed; inset: 0; z-index: 10;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease;
  }
  #dashboard.visible { opacity: 1; pointer-events: all; }

  /* Top bar */
  .topbar {
    position: absolute; top:0;left:0;right:0;height:52px;
    background:rgba(0,0,0,0.3);backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(200,40,40,0.15);
    display:flex;align-items:center;padding:0 20px;gap:14px;z-index:20;
  }
  .logo-block{display:flex;flex-direction:column;line-height:1;gap:2px}
  .logo-name{
    font-size:16px;font-weight:800;font-family:monospace;letter-spacing:3px;
    background:linear-gradient(90deg,#ff4444,#cc0000,#ff6666);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .logo-sub{font-size:8.5px;color:rgba(220,80,80,0.55);letter-spacing:.5px}
  .search-wrap{flex:1;max-width:340px;margin:0 auto}
  .search-wrap input{
    width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(200,40,40,0.2);
    border-radius:20px;padding:6px 14px;color:rgba(255,255,255,0.85);font-size:12.5px;outline:none;
  }
  .search-wrap input::placeholder{color:rgba(255,255,255,0.3)}
  .icon-btn{
    width:32px;height:32px;background:rgba(255,255,255,0.06);
    border:1px solid rgba(200,40,40,0.2);border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;
  }
  .clock-time{font-size:15px;font-weight:700;font-family:monospace;color:rgba(255,120,120,0.9)}
  .clock-date{font-size:9px;color:rgba(255,255,255,0.35);text-align:right}

  /* Expandable app grid — the main content area */
  .apps-area {
    position: absolute; top:52px; left:0; right:0; bottom:0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    overflow-y: auto;
  }

  /* STACKED state — cards pile up before expanding */
  .apps-stack {
    position: relative; width: 100%; max-width: 600px;
    height: 260px; margin: 0 auto 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .apps-stack-hint {
    font-size: 13px; color: rgba(255,120,120,0.6);
    letter-spacing: 1px; text-align: center; margin-top: 4px;
  }

  .pile-card {
    position: absolute;
    width: 140px; height: 140px;
    background: rgba(255,255,255,0.07); backdrop-filter: blur(18px);
    border: 1px solid rgba(200,40,40,0.28); border-radius: 22px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    transition: all 0.55s cubic-bezier(.34,1.56,.64,1);
    cursor: pointer;
  }
  .pile-card::before {
    content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,100,100,0.45), transparent);
  }
  .pile-card .p-icon { font-size: 32px; }
  .pile-card .p-name { font-size: 11px; color: rgba(255,255,255,0.85); font-weight: 500; text-align:center; padding: 0 6px; }
  .pile-card .p-cat { font-size: 9px; color: rgba(200,80,80,0.6); }

  /* Stacked positions */
  .pile-card:nth-child(1) { transform: rotate(-12deg) translateX(-140px) translateY(20px); z-index:1; }
  .pile-card:nth-child(2) { transform: rotate(-4deg) translateX(-45px) translateY(5px); z-index:2; }
  .pile-card:nth-child(3) { transform: rotate(3deg) translateX(50px) translateY(0); z-index:3; }
  .pile-card:nth-child(4) { transform: rotate(10deg) translateX(140px) translateY(15px); z-index:4; }
  .pile-card:nth-child(5) { transform: rotate(16deg) translateX(215px) translateY(30px); z-index:5; opacity:0.7; }

  /* EXPANDED grid state */
  .apps-stack.expanded {
    height: auto; min-height: unset;
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 14px; position: static; cursor: default;
    width: 100%; max-width: 700px;
  }
  .apps-stack.expanded .pile-card { position: static !important; width: 100%; height: 110px; transform: none !important; opacity: 1 !important; }
  .apps-stack.expanded .pile-card:hover { border-color: rgba(255,80,80,0.5); transform: translateY(-4px) scale(1.03) !important; }

  .back-btn {
    display: none;
    align-items: center; gap: 8px;
    background: rgba(200,0,0,0.12); border: 1px solid rgba(200,40,40,0.25);
    color: rgba(255,120,120,0.85); padding: 7px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    margin-bottom: 20px; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(200,0,0,0.22); }
  .back-btn.visible { display: flex; }

  .expand-hint {
    font-size: 12px; color: rgba(255,120,120,0.5); letter-spacing: 1px;
    margin-top: 16px; text-align: center; transition: opacity 0.3s;
  }
  .expand-hint.hidden { opacity: 0; pointer-events: none; }

  .add-card {
    height: 110px; background: rgba(200,0,0,0.05);
    border: 1.5px dashed rgba(200,40,40,0.25); border-radius: 22px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; transition: background 0.2s, border-color 0.2s;
  }
  .add-card:hover { background: rgba(200,0,0,0.1); border-color: rgba(255,80,80,0.4); }
  .add-plus { font-size: 22px; color: rgba(200,60,60,0.55); }
  .add-label { font-size: 9.5px; color: rgba(200,60,60,0.45); }
</style>
</head>
<body>

<canvas id="shader-canvas"></canvas>

<!-- LANDING -->
<div id="landing">
  <div class="stack-area">
    <div class="stack-card"><div class="stack-icon">🎮</div><div class="stack-name">XO Game</div></div>
    <div class="stack-card"><div class="stack-icon">📚</div><div class="stack-name">Study Hub</div></div>
    <div class="stack-card"><div class="stack-icon">🐍</div><div class="stack-name">Snake</div></div>
  </div>
  <div class="hero-eyebrow">Your personal launchpad</div>
  <div class="hero-title">MKLL</div>
  <div class="hero-sub">Mo Khattab Lamba Land</div>
  <div class="hero-desc">All your apps, tools, and games — one place, one click.</div>
  <button class="get-started-btn" onclick="enterDashboard()">Get Started →</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="logo-block">
      <span class="logo-name">MKLL</span>
      <span class="logo-sub">Mo Khattab Lamba Land</span>
    </div>
    <div class="search-wrap"><input type="text" placeholder="⌘K  Search apps…"/></div>
    <div style="display:flex;gap:8px">
      <div class="icon-btn">＋</div>
      <div class="icon-btn">⚙</div>
    </div>
    <div>
      <div class="clock-time" id="clk">21:47</div>
      <div class="clock-date" id="clkd">Sat, Mar 21</div>
    </div>
  </div>

  <div class="apps-area">
    <button class="back-btn" id="backBtn" onclick="collapseCards()">← Go back</button>

    <!-- Pile of cards — click to expand -->
    <div class="apps-stack" id="appsStack" onclick="expandCards()">
      <div class="pile-card"><div class="p-icon">🎮</div><div class="p-name">XO Game</div><div class="p-cat">Games</div></div>
      <div class="pile-card"><div class="p-icon">🐍</div><div class="p-name">Snake</div><div class="p-cat">Games</div></div>
      <div class="pile-card"><div class="p-icon">📚</div><div class="p-name">Study Hub</div><div class="p-cat">Tools</div></div>
      <div class="pile-card"><div class="p-icon">🌐</div><div class="p-name">Browser</div><div class="p-cat">Tools</div></div>
      <div class="pile-card"><div class="p-icon">💻</div><div class="p-name">Dev Tools</div><div class="p-cat">Tools</div></div>
    </div>

    <div class="expand-hint" id="expandHint">Click the cards to expand →</div>
  </div>
</div>

<script>
// ── Transitions ────────────────────────────────────────────────
function enterDashboard() {
  document.getElementById('landing').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('dashboard').classList.add('visible');
  }, 200);
}

let expanded = false;
function expandCards() {
  if (expanded) return;
  expanded = true;
  const stack = document.getElementById('appsStack');
  stack.classList.add('expanded');
  stack.onclick = null;

  // Add the "Add app" card
  const addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.innerHTML = '<div class="add-plus">＋</div><div class="add-label">Add app</div>';
  stack.appendChild(addCard);

  document.getElementById('backBtn').classList.add('visible');
  document.getElementById('expandHint').classList.add('hidden');
}
function collapseCards() {
  expanded = false;
  const stack = document.getElementById('appsStack');
  const addCard = stack.querySelector('.add-card');
  if (addCard) addCard.remove();
  stack.classList.remove('expanded');
  stack.onclick = expandCards;
  document.getElementById('backBtn').classList.remove('visible');
  document.getElementById('expandHint').classList.remove('hidden');
}

// ── Clock ──────────────────────────────────────────────────────
function updateClock() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clk').textContent = h+':'+m;
  const D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clkd').textContent = D[n.getDay()]+', '+M[n.getMonth()]+' '+n.getDate();
}
updateClock(); setInterval(updateClock,1000);

// ── WebGL Shader (red-shifted version) ────────────────────────
const canvas = document.getElementById('shader-canvas');
const gl = canvas.getContext('webgl2');
let program, uRes, uTime, uMove, uTouch;
let mouse=[0,0], mv=[0,0];

function resize() {
  const dpr = Math.max(1, 0.5*window.devicePixelRatio);
  canvas.width = innerWidth*dpr; canvas.height = innerHeight*dpr;
  canvas.style.width = innerWidth+'px'; canvas.style.height = innerHeight+'px';
  if(gl) gl.viewport(0,0,canvas.width,canvas.height);
}

const vert=`#version 300 es
precision highp float;
in vec4 position;
void main(){ gl_Position=position; }`;

// Red-shifted shader — same nebula but hue rotated toward deep crimson/red
const frag=`#version 300 es
precision highp float;
out vec4 O;
uniform vec2 resolution;
uniform float time;
uniform vec2 move;
uniform vec2 touch;
#define FC gl_FragCoord.xy
#define T time
#define R resolution
#define MN min(R.x,R.y)

float rnd(vec2 p){
  p=fract(p*vec2(12.9898,78.233));
  p+=dot(p,p+34.56);
  return fract(p.x*p.y);
}
float noise(in vec2 p){
  vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
  float a=rnd(i),b=rnd(i+vec2(1,0)),c=rnd(i+vec2(0,1)),d=rnd(i+1.);
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}
float fbm(vec2 p){
  float t=.0,a=1.;mat2 m=mat2(1.,-.5,.2,1.2);
  for(int i=0;i<5;i++){t+=a*noise(p);p*=2.*m;a*=.5;}
  return t;
}
float clouds(vec2 p){
  float d=1.,t=.0;
  for(float i=.0;i<3.;i++){
    float a=d*fbm(i*10.+p.x*.2+.2*(1.+i)*p.y+d+i*i+p);
    t=mix(t,d,a);d=a;p*=2./(i+1.);
  }
  return t;
}
void main(void){
  vec2 uv=(FC-.5*R)/MN, st=uv*vec2(2,1);
  vec3 col=vec3(0);
  float bg=clouds(vec2(st.x+T*.5,-st.y));
  uv*=1.-.3*(sin(T*.2)*.5+.5);
  for(float i=1.;i<12.;i++){
    uv+=.1*cos(i*vec2(.1+.01*i,.8)+i*i+T*.5+.1*uv.x);
    vec2 p=uv;
    float d=length(p);
    // Red shift: swap channels so red dominates instead of orange/yellow
    vec3 baseColor = cos(sin(i)*vec3(1,2,3))+1.;
    vec3 redShifted = vec3(baseColor.r*1.4+baseColor.g*0.4, baseColor.r*0.2, baseColor.b*0.1);
    col+=.00125/d*redShifted;
    float b=noise(i+p+bg*1.731);
    col+=.002*b/length(max(p,vec2(b*p.x*.02,p.y)));
    // Red-tinted fog
    col=mix(col,vec3(bg*.28,bg*.04,bg*.04),d);
  }
  O=vec4(col,1);
}`;

function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;}
function initGL(){
  const vs=mkShader(gl.VERTEX_SHADER,vert);
  const fs=mkShader(gl.FRAGMENT_SHADER,frag);
  program=gl.createProgram();
  gl.attachShader(program,vs);gl.attachShader(program,fs);gl.linkProgram(program);
  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,1,-1,-1,1,1,1,-1]),gl.STATIC_DRAW);
  const pos=gl.getAttribLocation(program,'position');
  gl.enableVertexAttribArray(pos);gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);
  uRes=gl.getUniformLocation(program,'resolution');
  uTime=gl.getUniformLocation(program,'time');
  uMove=gl.getUniformLocation(program,'move');
  uTouch=gl.getUniformLocation(program,'touch');
}
function render(now){
  gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(program);
  gl.uniform2f(uRes,canvas.width,canvas.height);
  gl.uniform1f(uTime,now*1e-3);
  gl.uniform2f(uMove,mv[0],mv[1]);
  gl.uniform2f(uTouch,mouse[0],mouse[1]);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(render);
}
canvas.addEventListener('mousemove',e=>{
  mv=[mv[0]+e.movementX,mv[1]+e.movementY];
  mouse=[e.clientX,canvas.height-e.clientY];
});
resize();window.addEventListener('resize',resize);
initGL();requestAnimationFrame(render);
</script>
</body>
</html>
