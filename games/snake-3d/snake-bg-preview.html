<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Background Animation Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #07080f; overflow: hidden; }
canvas { display: block; }
#label {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  color: rgba(248,245,253,0.35); font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; font-family: monospace; text-align: center;
  pointer-events: none;
}
#label span { color: #8eff71; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">Home screen background snake preview — <span>Canvas 2D</span></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// ── Snake Config ──────────────────────────────────────────────────────────────
const SEG_COUNT  = 120;  // number of body segments
const SEG_DIST   = 10;   // pixel distance between segments (tight = smooth body)
const SPEED      = 2.8;  // px per frame
const HEAD_R     = 16;   // head radius px
const TAIL_R     = 2;    // tail tip radius px
const TURN_NOISE = 0.05; // random turn impulse per frame
const DAMPEN     = 0.90; // angular velocity damping

// ── State ─────────────────────────────────────────────────────────────────────
let headX = W / 2;
let headY = H / 2;
let headAngle = Math.random() * Math.PI * 2;
let angleVel  = 0;

// Path ring-buffer: stores past {x,y} — pre-curved so snake starts with shape
const path = [];
let seedAngle = headAngle;
let seedX = headX, seedY = headY;
for (let i = 0; i < SEG_COUNT + 2; i++) {
  path.push({ x: seedX, y: seedY });
  seedAngle += 0.04 * Math.sin(i * 0.12); // gentle S-curve seed
  seedX -= Math.cos(seedAngle) * SEG_DIST;
  seedY -= Math.sin(seedAngle) * SEG_DIST;
}

// ── Color helpers ─────────────────────────────────────────────────────────────
// Head → bright #8eff71, body fades to #1a6a0a, tail nearly black-green
function segColor(t) { // t: 0=head, 1=tail
  // interpolate via three stops: 0 → #8eff71, 0.4 → #2be800, 1 → #0a3a04
  if (t < 0.4) {
    const u = t / 0.4;
    const r = Math.round(0x8e + (0x2b - 0x8e) * u);
    const g = Math.round(0xff + (0xe8 - 0xff) * u);
    const b = Math.round(0x71 + (0x00 - 0x71) * u);
    return `rgb(${r},${g},${b})`;
  } else {
    const u = (t - 0.4) / 0.6;
    const r = Math.round(0x2b + (0x0a - 0x2b) * u);
    const g = Math.round(0xe8 + (0x3a - 0xe8) * u);
    const b = Math.round(0x00 + (0x04 - 0x00) * u);
    return `rgb(${r},${g},${b})`;
  }
}

function segGlow(t) { // glow strength decreases toward tail
  if (t < 0.15) return `rgba(142,255,113,${0.55 - t * 2})`;
  if (t < 0.5)  return `rgba(43,232,0,${0.35 - (t-0.15) * 0.5})`;
  return `rgba(20,120,5,${0.12 - (t-0.5) * 0.24})`;
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  // Random turn impulse
  angleVel += (Math.random() - 0.5) * TURN_NOISE * 2;
  angleVel *= DAMPEN;

  // Center steering: if far from center, nudge toward it
  const dx = W/2 - headX;
  const dy = H/2 - headY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const maxDist = Math.min(W, H) * 0.38;
  if (dist > maxDist) {
    const targetAngle = Math.atan2(dy, dx);
    let diff = targetAngle - headAngle;
    // Normalize diff to [-π, π]
    while (diff >  Math.PI) diff -= 2 * Math.PI;
    while (diff < -Math.PI) diff += 2 * Math.PI;
    const strength = (dist - maxDist) / (Math.min(W,H) * 0.2);
    angleVel += diff * 0.028 * Math.min(strength, 1);
  }

  // Clamp angular velocity so turns feel organic
  angleVel = Math.max(-0.055, Math.min(0.055, angleVel));

  headAngle += angleVel;
  headX += Math.cos(headAngle) * SPEED;
  headY += Math.sin(headAngle) * SPEED;

  // Push new head position
  path.unshift({ x: headX, y: headY });
  if (path.length > SEG_COUNT + 2) path.pop();
}

// ── Draw ──────────────────────────────────────────────────────────────────────
let lastMouseX = -999, lastMouseY = -999;
document.addEventListener('mousemove', e => { lastMouseX = e.clientX; lastMouseY = e.clientY; });

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Dark background — show the dim grid vibe from the game bg
  ctx.fillStyle = '#07080f';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(40,40,55,0.55)';
  ctx.lineWidth = 1;
  const CELL = 40;
  for (let x = 0; x < W; x += CELL) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += CELL) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Floor glow behind snake (radial from approximate center of snake mass)
  const gx = ctx.createRadialGradient(headX, headY, 0, headX, headY, 280);
  gx.addColorStop(0, 'rgba(142,255,113,0.045)');
  gx.addColorStop(1, 'transparent');
  ctx.fillStyle = gx;
  ctx.fillRect(0, 0, W, H);

  const segs = Math.min(path.length - 1, SEG_COUNT);

  // Draw body as a filled path first (smooth connected body)
  if (segs > 2) {
    // Draw smooth centerline path as thick stroke — one color per segment using clipping
    // Instead: draw body silhouette, then glow, then detail circles on top

    // --- Outer glow pass (wide, soft) ---
    for (let i = segs - 1; i >= 0; i -= 3) {
      const t = i / (segs - 1);
      if (t > 0.8) continue;
      const p = path[i];
      const r = HEAD_R - (HEAD_R - TAIL_R) * t;
      const glowR = r * 2.5 + (1 - t) * 8;
      const gGlow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
      gGlow.addColorStop(0, `rgba(80,220,50,${0.12 - t * 0.12})`);
      gGlow.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = gGlow;
      ctx.fill();
    }

    // --- Body base pass (tail→head, each segment circle overlapping) ---
    for (let i = segs - 1; i >= 0; i--) {
      const t = i / (segs - 1);
      const p = path[i];
      const r = HEAD_R - (HEAD_R - TAIL_R) * t;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle = segColor(t);
      ctx.fill();
    }

    // --- Highlight pass (sheen on upper body segments) ---
    for (let i = Math.min(segs - 1, 70); i >= 0; i--) {
      const t = i / (segs - 1);
      if (t > 0.65) continue;
      const p = path[i];
      const r = HEAD_R - (HEAD_R - TAIL_R) * t;
      const alpha = (0.65 - t) * 0.55;
      const gRim = ctx.createRadialGradient(p.x - r*0.4, p.y - r*0.45, 0, p.x, p.y, r);
      gRim.addColorStop(0, `rgba(230,255,210,${alpha})`);
      gRim.addColorStop(0.5, `rgba(180,255,160,${alpha * 0.3})`);
      gRim.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle = gRim;
      ctx.fill();
    }
  }

  // ── Head details ────────────────────────────────────────────────────────────
  if (path.length >= 2) {
    const headP = path[0];
    // Compute head facing angle from first two path points
    const nextP = path[1];
    const faceAngle = Math.atan2(headP.y - nextP.y, headP.x - nextP.x);

    // Eyes
    const eyeOffset = HEAD_R * 0.48;
    const eyeForward = HEAD_R * 0.38;
    const perpX = -Math.sin(faceAngle);
    const perpY =  Math.cos(faceAngle);
    const fwdX  =  Math.cos(faceAngle);
    const fwdY  =  Math.sin(faceAngle);

    [-1, 1].forEach(side => {
      const ex = headP.x + fwdX * eyeForward + perpX * eyeOffset * side;
      const ey = headP.y + fwdY * eyeForward + perpY * eyeOffset * side;

      // Eye white-ish sclera
      ctx.beginPath();
      ctx.arc(ex, ey, 3.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(220,240,220,0.92)';
      ctx.fill();

      // Neon pupil
      const glowEye = ctx.createRadialGradient(ex, ey, 0, ex, ey, 3.8);
      glowEye.addColorStop(0, 'rgba(142,255,113,1)');
      glowEye.addColorStop(0.5, 'rgba(80,200,60,0.7)');
      glowEye.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(ex, ey, 3.8, 0, Math.PI * 2);
      ctx.fillStyle = glowEye;
      ctx.fill();

      // Dark pupil center
      ctx.beginPath();
      ctx.arc(ex, ey, 1.3, 0, Math.PI * 2);
      ctx.fillStyle = '#0a1a08';
      ctx.fill();
    });

    // Tongue flick (every 120 frames)
    const tick = Math.floor(Date.now() / 16);
    const tonguePhase = tick % 160;
    if (tonguePhase < 30) {
      const tongueLen = 11 * Math.sin((tonguePhase / 30) * Math.PI);
      const tx = headP.x + fwdX * (HEAD_R + tongueLen * 0.6);
      const ty = headP.y + fwdY * (HEAD_R + tongueLen * 0.6);
      // Fork
      [-0.22, 0.22].forEach(ang => {
        const a2 = faceAngle + ang;
        ctx.beginPath();
        ctx.moveTo(headP.x + fwdX * HEAD_R, headP.y + fwdY * HEAD_R);
        ctx.lineTo(tx + Math.cos(a2) * tongueLen * 0.5,
                   ty + Math.sin(a2) * tongueLen * 0.5);
        ctx.strokeStyle = '#ff4466';
        ctx.lineWidth = 1.2;
        ctx.stroke();
      });
    }
  }
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
